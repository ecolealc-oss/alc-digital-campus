<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ALC Digital Campus</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#0D1B2A;color:#1B2D5B;}
:root{
  --blue:#1B2D5B;--blue-dark:#0D1B2A;--blue-mid:#2A468A;
  --gold:#C9A84C;--gold-light:#F0D98C;--gold-dim:#8B6B28;
  --bg:#F2F5FA;--white:#FFFFFF;
  --green:#1A7A4A;--red:#C0392B;--purple:#6B46C1;--orange:#E67E22;
  --shadow:0 4px 24px rgba(13,27,42,0.13);
}
#root{height:100%;}

/* ══ SPLASH ══ */
.splash{position:fixed;inset:0;background:var(--blue-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s;}
.splash.hide{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Playfair Display',serif;font-size:54px;color:var(--gold);font-weight:900;letter-spacing:3px;animation:fadeUp 0.8s ease;}
.splash-sub{color:rgba(201,168,76,0.55);font-size:10px;letter-spacing:6px;text-transform:uppercase;margin-top:8px;animation:fadeUp 0.8s ease 0.2s both;}
.splash-tag{color:rgba(255,255,255,0.25);font-size:12px;margin-top:18px;animation:fadeUp 0.8s ease 0.4s both;font-style:italic;}
.splash-bar{width:150px;height:2px;background:rgba(201,168,76,0.2);border-radius:2px;margin-top:28px;overflow:hidden;}
.splash-fill{height:100%;background:var(--gold);animation:fillBar 2.5s ease forwards;}
@keyframes fillBar{from{width:0}to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ══ AUTH ══ */
.auth-screen{min-height:100vh;background:linear-gradient(160deg,var(--blue-dark) 0%,var(--blue) 60%,var(--blue-mid) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:var(--white);border-radius:24px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.auth-logo{text-align:center;margin-bottom:20px;}
.auth-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--blue);text-align:center;margin-bottom:4px;}
.auth-sub{font-size:12px;color:#718096;text-align:center;margin-bottom:22px;}
.auth-tab-row{display:flex;background:#F2F5FA;border-radius:12px;padding:4px;margin-bottom:20px;}
.auth-tab{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;color:#A0AEC0;cursor:pointer;transition:all 0.2s;}
.auth-tab.on{background:var(--white);color:var(--blue);box-shadow:0 2px 8px rgba(27,45,91,0.1);}
.auth-input{width:100%;padding:12px 14px;border:2px solid #E8EEF6;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--blue);outline:none;margin-bottom:12px;transition:border-color 0.2s;}
.auth-input:focus{border-color:var(--gold);}
.auth-label{font-size:11.5px;font-weight:700;color:var(--blue);margin-bottom:5px;display:block;}
.auth-divider{text-align:center;color:#A0AEC0;font-size:11px;margin:14px 0;position:relative;}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#E8EEF6;}
.auth-divider::before{left:0;}
.auth-divider::after{right:0;}
.auth-guest{background:none;border:2px solid #E8EEF6;border-radius:12px;width:100%;padding:11px;font-family:'DM Sans',sans-serif;font-size:13px;color:#718096;font-weight:600;cursor:pointer;}
.auth-forgot{text-align:right;margin-bottom:14px;}
.auth-forgot a{font-size:11.5px;color:var(--gold);text-decoration:none;font-weight:600;}

/* ══ APP ══ */
.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}

/* ══ HEADER ══ */
.hdr{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);flex-shrink:0;box-shadow:0 4px 20px rgba(13,27,42,0.4);}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-title{color:var(--white);font-family:'Playfair Display',serif;font-size:15px;font-weight:900;line-height:1.1;}
.hdr-sub{color:var(--gold);font-size:7px;letter-spacing:3px;text-transform:uppercase;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-lang{background:rgba(255,255,255,0.1);border:none;border-radius:8px;color:var(--gold);font-size:10px;font-weight:700;padding:4px 8px;cursor:pointer;letter-spacing:1px;}
.hdr-search-btn{background:rgba(255,255,255,0.1);border:none;border-radius:8px;color:var(--white);font-size:14px;padding:5px 7px;cursor:pointer;}
.hdr-notif{position:relative;background:rgba(255,255,255,0.1);border:none;border-radius:8px;color:var(--white);font-size:14px;padding:5px 7px;cursor:pointer;}
.notif-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--blue-dark);}
.hdr-avatar{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--blue);font-size:12px;border:2px solid rgba(201,168,76,0.4);cursor:pointer;}

/* ══ SEARCH BAR ══ */
.search-bar{padding:10px 16px;background:var(--white);border-bottom:1px solid #E8EEF6;display:flex;gap:8px;align-items:center;}
.search-input{flex:1;padding:9px 13px;border:2px solid #E8EEF6;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--blue);outline:none;}
.search-input:focus{border-color:var(--gold);}
.search-close{background:none;border:none;font-size:18px;color:#A0AEC0;cursor:pointer;}

/* ══ PAGE ══ */
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px;}
.page::-webkit-scrollbar{width:0;}

/* ══ NAV ══ */
.nav{position:absolute;bottom:0;left:0;right:0;height:62px;background:var(--white);border-top:1px solid #E0E6F0;display:flex;align-items:stretch;box-shadow:0 -4px 20px rgba(27,45,91,0.08);}
.nav-btn{flex:1;min-width:48px;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#A0AEC0;font-size:7.5px;font-weight:700;transition:color 0.2s;position:relative;padding:0 2px;}
.nav-btn.on{color:var(--gold);}
.nav-btn.on::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2.5px;background:var(--gold);border-radius:0 0 4px 4px;}
.nav-icon{font-size:18px;line-height:1;}

/* ══ SHARED ══ */
.sec{padding:16px 14px 0;}
.sec-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--blue);}
.sec-sub{font-size:11px;color:#718096;margin-top:2px;}
.btn{border:none;border-radius:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--blue-dark);padding:13px 18px;font-size:13px;width:100%;}
.btn-gold:active{filter:brightness(0.92);}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:var(--white);padding:13px 18px;font-size:13px;width:100%;}
.btn-outline{background:transparent;border:2px solid var(--blue);color:var(--blue);padding:10px 14px;font-size:12px;}
.btn-sm{padding:7px 14px;font-size:11px;border-radius:8px;}
.btn-back{background:none;border:none;color:#718096;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;padding:12px 14px 4px;}
.card{background:var(--white);border-radius:16px;margin:0 14px 12px;box-shadow:0 2px 12px rgba(27,45,91,0.07);overflow:hidden;}
.card-title{padding:12px 15px 9px;font-weight:700;font-size:13.5px;color:var(--blue);border-bottom:1px solid #F0F2F8;}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:9.5px;font-weight:700;letter-spacing:0.3px;}

/* ══ HOME ══ */
.hero{margin:13px 14px 10px;padding:18px 16px;border-radius:20px;background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 60%,var(--blue-mid) 100%);box-shadow:var(--shadow);}
.hero-name{color:rgba(255,255,255,0.5);font-size:11px;}
.hero-user{color:var(--white);font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-top:2px;}
.hero-row{display:flex;gap:8px;margin-top:12px;}
.hero-stat{flex:1;background:rgba(255,255,255,0.08);border-radius:11px;padding:9px 6px;text-align:center;}
.hero-stat-val{color:var(--gold);font-size:19px;font-weight:900;font-family:'Playfair Display',serif;}
.hero-stat-lbl{color:rgba(255,255,255,0.4);font-size:8.5px;margin-top:1px;}
.counter-band{margin:0 14px 12px;padding:13px 14px;border-radius:15px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));display:flex;justify-content:space-around;}
.ctr-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--blue-dark);text-align:center;}
.ctr-lbl{font-size:8.5px;font-weight:700;color:rgba(13,27,42,0.6);text-align:center;margin-top:1px;}

/* NEWS */
.news-scroll{display:flex;gap:10px;padding:10px 14px;overflow-x:auto;}
.news-scroll::-webkit-scrollbar{height:0;}
.news-card{flex-shrink:0;width:200px;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(27,45,91,0.1);}
.news-img{height:90px;display:flex;align-items:center;justify-content:center;font-size:36px;}
.news-body{background:var(--white);padding:10px 12px;}
.news-tag{font-size:8.5px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
.news-title{font-size:12px;font-weight:700;color:var(--blue);margin-top:3px;line-height:1.35;}
.news-date{font-size:10px;color:#A0AEC0;margin-top:4px;}

/* CATALOGUE */
.fil-card{margin:0 14px 9px;padding:12px 13px;border-radius:14px;background:var(--white);box-shadow:0 2px 10px rgba(27,45,91,0.07);border-left:4px solid var(--gold);cursor:pointer;transition:transform 0.15s;}
.fil-card:active{transform:scale(0.98);}
.fil-card-inner{display:flex;align-items:center;gap:11px;}
.fil-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.fil-label{font-weight:700;font-size:13px;color:var(--blue);}
.fil-count{font-size:10px;color:#718096;margin-top:1px;}
.fil-arrow{margin-left:auto;color:#CBD5E0;font-size:16px;transition:transform 0.2s;}
.fil-open .fil-arrow{color:var(--gold);transform:rotate(90deg);}
.sub-wrap{margin:0 14px 3px;padding:0 0 3px 13px;border-left:2px solid rgba(201,168,76,0.2);}
.sub-card{background:#F8FAFC;border-radius:11px;padding:9px 12px;margin-bottom:6px;cursor:pointer;border:1.5px solid #E8EEF6;transition:border-color 0.15s;}
.sub-title{font-weight:700;font-size:12px;color:var(--blue);}
.sub-count{font-size:10px;color:#718096;}
.sub-chev{float:right;color:#CBD5E0;}
.mod-list{padding:3px 0 5px;}
.mod-item{display:flex;align-items:center;gap:8px;padding:7px 9px;margin-bottom:4px;border-radius:9px;background:var(--white);border:1.5px solid #E8EEF6;cursor:pointer;transition:all 0.15s;}
.mod-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.mod-name{flex:1;font-size:11.5px;color:var(--blue);font-weight:500;}
.mod-price{font-size:10px;font-weight:700;color:var(--gold);}
.mod-enrolled{font-size:10px;color:var(--green);font-weight:700;}

/* ══ LEARN TAB ══ */
.path-wrap{padding:14px;}
.path-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--blue);margin-bottom:12px;}
.path-node{display:flex;align-items:center;gap:12px;margin-bottom:16px;position:relative;}
.path-node::before{content:'';position:absolute;left:20px;top:42px;width:2px;height:16px;background:rgba(201,168,76,0.3);}
.path-node:last-child::before{display:none;}
.path-circle{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:3px solid transparent;}
.path-circle.done{background:var(--blue);border-color:var(--gold);}
.path-circle.active{background:var(--gold);border-color:var(--gold-dim);}
.path-circle.locked{background:#E8EEF6;border-color:#CBD5E0;}
.path-info{flex:1;}
.path-name{font-weight:700;font-size:13px;color:var(--blue);}
.path-status{font-size:10.5px;margin-top:2px;}
.path-pct{font-size:12px;font-weight:800;color:var(--gold);}
.lib-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid #F0F2F8;cursor:pointer;}
.lib-item:last-child{border-bottom:none;}
.lib-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.lib-name{flex:1;font-size:12.5px;font-weight:600;color:var(--blue);}
.lib-size{font-size:10px;color:#A0AEC0;}
.cal-item{display:flex;gap:12px;padding:11px 14px;border-bottom:1px solid #F0F2F8;align-items:center;}
.cal-item:last-child{border-bottom:none;}
.cal-date{width:40px;text-align:center;flex-shrink:0;}
.cal-day{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--blue);line-height:1;}
.cal-month{font-size:9px;font-weight:700;color:var(--gold);text-transform:uppercase;}
.cal-name{font-weight:700;font-size:12.5px;color:var(--blue);}
.cal-time{font-size:10.5px;color:#718096;margin-top:2px;}
.cal-type{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;}
.video-item{padding:11px 14px;border-bottom:1px solid #F0F2F8;cursor:pointer;}
.video-item:last-child{border-bottom:none;}
.video-thumb{height:90px;border-radius:10px;background:var(--blue-dark);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:8px;position:relative;}
.video-play{position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(201,168,76,0.9);display:flex;align-items:center;justify-content:center;font-size:14px;}
.video-title{font-weight:700;font-size:12.5px;color:var(--blue);}
.video-meta{font-size:10.5px;color:#A0AEC0;margin-top:2px;}

/* ══ DASHBOARD ══ */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 14px 12px;}
.dash-card{background:var(--white);border-radius:13px;padding:13px;box-shadow:0 2px 10px rgba(27,45,91,0.06);border-top:3px solid var(--gold);}
.dash-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--blue);}
.dash-lbl{font-size:10px;color:#A0AEC0;margin-top:2px;}
.dash-icon{font-size:24px;margin-bottom:5px;}
.graph-wrap{padding:14px;background:var(--white);margin:0 14px 12px;border-radius:14px;box-shadow:0 2px 10px rgba(27,45,91,0.06);}
.graph-title{font-weight:700;font-size:13px;color:var(--blue);margin-bottom:12px;}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;}
.bar{flex:1;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--gold),var(--gold-dim));min-width:0;transition:height 0.4s;}
.bar-lbl{font-size:8.5px;color:#A0AEC0;text-align:center;margin-top:4px;}
.badge-row{display:flex;gap:9px;padding:12px 14px;overflow-x:auto;}
.badge-row::-webkit-scrollbar{height:0;}
.badge-item{flex-shrink:0;text-align:center;width:68px;}
.badge-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 4px;}
.badge-circle.earned{background:linear-gradient(135deg,var(--gold-dim),var(--gold));box-shadow:0 3px 10px rgba(201,168,76,0.35);}
.badge-circle.locked{background:#E8EEF6;filter:grayscale(1);opacity:0.5;}
.badge-name{font-size:8.5px;font-weight:700;color:var(--blue);line-height:1.2;}
.enr-item{background:var(--white);border-radius:12px;padding:11px 13px;margin:0 14px 9px;display:flex;align-items:center;gap:11px;box-shadow:0 2px 8px rgba(27,45,91,0.06);cursor:pointer;border-left:4px solid var(--gold);}
.enr-title{font-weight:700;font-size:12.5px;color:var(--blue);}
.enr-sub{font-size:10px;color:#A0AEC0;margin-top:1px;}
.enr-pct{margin-left:auto;font-weight:800;font-size:13px;color:var(--gold);}
.review-stars{color:var(--gold);font-size:14px;margin:4px 0;}

/* ══ COMMUNITY ══ */
.forum-post{background:var(--white);border-radius:13px;padding:12px;margin-bottom:10px;box-shadow:0 2px 10px rgba(27,45,91,0.06);}
.post-header{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.post-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:var(--white);flex-shrink:0;}
.post-author{font-weight:700;font-size:12px;}
.post-meta{font-size:9.5px;color:#A0AEC0;}
.post-text{font-size:12px;color:#2D3748;line-height:1.6;margin-bottom:8px;}
.post-reply{background:#F8FAFC;border-radius:9px;padding:8px 11px;margin-bottom:5px;border-left:3px solid var(--gold);}
.reply-author{font-weight:700;font-size:10px;color:var(--blue);margin-bottom:2px;}
.reply-text{font-size:11px;color:#4A5568;line-height:1.5;}
.reply-prof{border-left-color:var(--blue);}
.forum-input-row{display:flex;gap:7px;margin-top:7px;}
.forum-input{flex:1;padding:8px 11px;border:1.5px solid #E8EEF6;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;color:var(--blue);}
.forum-input:focus{border-color:var(--gold);}
.forum-send{background:var(--blue);border:none;border-radius:9px;padding:8px 13px;color:var(--white);font-size:13px;cursor:pointer;}
.forum-textarea{width:100%;min-height:68px;padding:9px 11px;border:1.5px solid #E8EEF6;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;resize:none;color:var(--blue);}
.forum-textarea:focus{border-color:var(--gold);}
.testimonial-card{background:var(--white);border-radius:14px;padding:16px;margin:0 14px 10px;box-shadow:0 2px 12px rgba(27,45,91,0.07);border-top:3px solid var(--gold);}
.testi-quote{font-size:28px;color:var(--gold);line-height:1;}
.testi-text{font-size:12.5px;color:#2D3748;line-height:1.6;margin:6px 0 12px;font-style:italic;}
.testi-author{display:flex;align-items:center;gap:10px;}
.testi-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--white);}
.testi-name{font-weight:700;font-size:12.5px;color:var(--blue);}
.testi-role{font-size:10px;color:#718096;}
.alumni-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid #F0F2F8;}
.alumni-item:last-child{border-bottom:none;}
.alumni-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--white);flex-shrink:0;}
.alumni-name{font-weight:700;font-size:12.5px;color:var(--blue);}
.alumni-role{font-size:10.5px;color:#718096;margin-top:1px;}
.alumni-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:#EEF0F8;color:var(--blue);margin-top:3px;display:inline-block;}
.job-item{padding:13px 14px;border-bottom:1px solid #F0F2F8;cursor:pointer;}
.job-item:last-child{border-bottom:none;}
.job-title{font-weight:700;font-size:13px;color:var(--blue);}
.job-company{font-size:11px;color:#718096;margin-top:2px;}

function App(){

  const [expSub,setExpSub]=useState(null);
  const [activeProg,setActive]=useState(null);
  const [subView,setSubView]=useState(null);
  const [certProg,setCert]=useState(null);

  const [searchQ,setSearchQ]=useState("");

  const [diagLevel,setDiagLevel]=useState(null);
  const [diagDone,setDiagDone]=useState(false);
  const [bookSession,setBookSession]=useState(null);
  const [payMethod,setPayMethod]=useState(null);
  const [payPhone,setPayPhone]=useState("");
  const [payOk,setPayOk]=useState(false);
  const [qStep,setQStep]=useState(0);
  const [qAns,setQAns]=useState([]);
  const [qSel,setQSel]=useState(null);
  const [qDone,setQDone]=useState(false);
  const [posts,setPosts]=useState([
    {id:1,author:"Kouamé A.",av:"KA",color:"#1B2D5B",cat:"CS1",time:"Il y a 2h",text:"Comment distinguer la communication de crise de la institutionnelle classique ?",replies:[{author:"Prof. Yao",av:"PY",color:"#8B4513",text:"La communication de crise est réactive et urgente. L'institutionnelle est proactive et stratégique.",time:"Il y a 1h",isProf:true}]},
    {id:2,author:"Marie-Claire K.",av:"MK",color:"#1A5C35",cat:"Formation",time:"Il y a 5h",text:"J'ai terminé le Storytelling pédagogique — vraiment transformateur !",replies:[]},
  ]);
  const [newPost,setNewPost]=useState("");
  const [replyMap,setReplyMap]=useState({});
  const [aiMsgs,setAiMsgs]=useState([{role:"bot",text:"Bonjour ! Je suis votre Assistant IA ALC. Comment puis-je vous aider aujourd'hui ? 🎓"}]);
  const [aiInput,setAiInput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [notifs,setNotifs]=useState(NOTIFS);
  const [faqOpen,setFaqOpen]=useState(null);
  const [tickets,setTickets]=useState([
    {id:1,title:"Question sur le paiement Mobile Money",status:"Résolu",date:"5 Mars 2025",statusColor:"#1A7A4A"},
    {id:2,title:"Accès au module Communication",status:"En cours",date:"8 Mars 2025",statusColor:"#C9A84C"},
  ]);
  const [ticketInput,setTicketInput]=useState("");
  const [authEmail,setAuthEmail]=useState("");
  const [authPass,setAuthPass]=useState("");
  const [authName,setAuthName]=useState("");
  const [userName,setUserName]=useState("Kan Parfait Kouamé");
  const [copiedNum,setCopiedNum]=useState("");
  const aiEndRef=useRef(null);
  const t=T[lang];

  useEffect(()=>{setTimeout(()=>setSplashDone(true),2700);},[]);
  useEffect(()=>{aiEndRef.current?.scrollIntoView({behavior:"smooth"});},[aiMsgs]);

  const enrolled=programs.filter(p=>p.enrolled);
  const completed=programs.filter(p=>p.progress===100);
  const totalPct=enrolled.length?Math.round(enrolled.reduce((s,p)=>s+p.progress,0)/enrolled.length):0;
  const unreadCount=notifs.filter(n=>n.unread).length;

  const enroll=id=>setPrograms(prev=>prev.map(p=>p.id===id?{...p,enrolled:true,progress:10}:p));
  const openCourse=prog=>{setActive(prog);setSubView("course");};
  const openPay=prog=>{setActive(prog);setPayMethod(null);setPayPhone("");setPayOk(false);setSubView("pay");};
  const resetQuiz=()=>{setQStep(0);setQAns([]);setQSel(null);setQDone(false);};
  const startQuiz=()=>{resetQuiz();setSubView("quiz");};

  const handleAnswer=i=>{
    setQSel(i);
    setTimeout(()=>{
      const next=[...qAns,i];setQAns(next);
      if(qStep+1<QUIZ_BANK.length){setQStep(s=>s+1);setQSel(null);}else setQDone(true);
    },700);
  };

  const confirmPay=()=>{
    if(!payPhone.trim())return;
    setPayOk(true);enroll(activeProg.id);
  };

  const copyNum=num=>{
    setCopiedNum(num);
    setTimeout(()=>setCopiedNum(""),2000);
  };

  const submitPost=()=>{
    if(!newPost.trim())return;
    setPosts(prev=>[{id:Date.now(),author:userName.split(" ")[0]+" "+userName.split(" ").slice(-1)[0].charAt(0)+".",av:"KP",color:"#1B2D5B",cat:"Général",time:"À l'instant",text:newPost,replies:[]}, ...prev]);
    setNewPost("");
  };
  const submitReply=id=>{
    if(!replyMap[id]?.trim())return;
    setPosts(prev=>prev.map(p=>p.id===id?{...p,replies:[...p.replies,{author:"KP",av:"KP",text:replyMap[id],time:"À l'instant",isProf:false}]}:p));
    setReplyMap(r=>({...r,[id]:""}));
  };

  const sendToAI=async(msg)=>{
    if(!msg.trim()||aiLoading)return;
    const userMsg={role:"user",text:msg};
    setAiMsgs(prev=>[...prev,userMsg]);
    setAiInput("");setAiLoading(true);
    try{
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
        body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:500,
          messages:[
            {role:"system",content:`Tu es l'Assistant IA de l'ALC Institute (Formation · Impact · Influence), basé à Abidjan Songon, Côte d'Ivoire. Tu réponds uniquement sur les formations, l'orientation, les inscriptions, les paiements (Orange Money +225 0777727482, Wave +225 0141234600), et la vie académique. Sois chaleureux, professionnel, concis. Réponds en ${lang==="fr"?"français":"anglais"}.`},
            ...aiMsgs.slice(-6).map(m=>({role:m.role==="bot"?"assistant":"user",content:m.text})),
            {role:"user",content:msg}
          ]
        })
      });
      const data=await res.json();
      const reply=data.content?.[0]?.text||data.choices?.[0]?.message?.content||"Je suis là pour vous aider !";
      setAiMsgs(prev=>[...prev,{role:"bot",text:reply}]);
    }catch(e){setAiMsgs(prev=>[...prev,{role:"bot",text:"Désolé, une erreur s'est produite. Contactez-nous sur WhatsApp : +225 0141234600"}]);}
    setAiLoading(false);
  };

  const submitTicket=()=>{
    if(!ticketInput.trim())return;
    setTickets(prev=>[{id:Date.now(),title:ticketInput,status:"En attente",date:new Date().toLocaleDateString("fr-FR"),statusColor:"#C9A84C"},...prev]);
    setTicketInput("");
  };

  const searchResults=searchQ?ALL_PROGS.filter(p=>p.title.toLowerCase().includes(searchQ.toLowerCase())||p.catLabel?.fr?.toLowerCase().includes(searchQ.toLowerCase())).slice(0,8):[];

  /* ── AUTH SCREEN ── */
  if(!authed){
    return(
      <div className="auth-screen">
        <div className="auth-card">
          <div className="auth-logo"><Logo size={52}/></div>
          <div className="auth-title">ALC Digital Campus</div>
          <div className="auth-sub">Formation · Impact · Influence</div>
          <div className="auth-tab-row">
            <button className={`auth-tab ${authMode==="login"?"on":""}`} onClick={()=>setAuthMode("login")}>{t.login}</button>
            <button className={`auth-tab ${authMode==="register"?"on":""}`} onClick={()=>setAuthMode("register")}>{t.register}</button>
          </div>
          {authMode==="register"&&<><label className="auth-label">Nom complet</label><input className="auth-input" value={authName} onChange={e=>setAuthName(e.target.value)} placeholder="Votre nom complet"/></>}
          <label className="auth-label">Email</label>
          <input className="auth-input" type="email" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} placeholder="votre@email.com"/>
          <label className="auth-label">Mot de passe</label>
          <input className="auth-input" type="password" value={authPass} onChange={e=>setAuthPass(e.target.value)} placeholder="••••••••"/>
          {authMode==="login"&&<div className="auth-forgot"><a href="#">Mot de passe oublié ?</a></div>}
          <button className="btn btn-gold" style={{marginBottom:12}} onClick={()=>{if(authName)setUserName(authName);setAuthed(true);}}>
            {authMode==="login"?"Se connecter →":"Créer mon compte →"}
          </button>
          <div className="auth-divider">ou</div>
          <button className="auth-guest" onClick={()=>setAuthed(true)}>{t.guest}</button>
        </div>
      </div>
    );
  }

  /* ── SPLASH ── */
  if(!splashDone) return(
    <div className="splash">
      <div className="splash-logo">ALC</div>
      <div className="splash-sub">Digital Campus</div>
      <div className="splash-tag">Formation · Impact · Influence</div>
      <div className="splash-bar"><div className="splash-fill"/></div>
    </div>
  );

  /* ── COURSE VIEW ── */
  if(subView==="course"&&activeProg){
    const prog=programs.find(p=>p.id===activeProg.id)||activeProg;
    const lessons=[
      {title:"Introduction & Objectifs",dur:"40 min",done:true},
      {title:"Fondements & Concepts clés",dur:"55 min",done:prog.progress>=20},
      {title:"Support de cours (PDF)",dur:"PDF",done:prog.progress>=30},
      {title:"Approfondissement pratique",dur:"35 min",done:prog.progress>=50},
      {title:"Étude de cas réel",dur:"30 min",done:prog.progress>=60},
      {title:"Quiz d'évaluation",dur:"15 min",done:prog.progress>=90},
      {title:"Certification",dur:"—",done:prog.progress===100},
    ];
    return(
      <div className="app">
        <div className="hdr"><div className="hdr-brand"><Logo/><div><div className="hdr-title">ALC Digital Campus</div><div className="hdr-sub">Formation · Impact · Influence</div></div></div><div className="hdr-avatar">KP</div></div>
        <div className="page">
          <button className="btn-back" onClick={()=>setSubView(null)}>← Retour</button>
          <div className="mod-hero" style={{background:`linear-gradient(135deg,${prog.catColor},${prog.catColor}CC)`}}>
            <div className="mod-hero-top">
              <div className="mod-cat-tag" style={{color:prog.accent}}>{prog.catIcon} {typeof prog.catLabel==="object"?prog.catLabel[lang]:prog.catLabel}</div>

              <div className="mod-meta"><span>📊 {prog.level}</span><span>💰 {prog.price.toLocaleString()} FCFA</span></div>
              <div className="progress-bar"><div className="progress-fill" style={{width:prog.progress+"%"}}/></div>
              <div className="progress-lbl">{prog.progress}% complété</div>
            </div>
          </div>
          {/* Rating */}
          <div className="card" style={{margin:"0 14px 12px"}}>
            <div style={{padding:"12px 14px"}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--blue)",marginBottom:6}}>⭐ Votre avis</div>

              <div style={{fontSize:11,color:"#A0AEC0"}}>Cliquez pour noter ce module</div>
            </div>
          </div>
          <div className="card">
            <div className="card-title">📋 Contenu du cours</div>
            {lessons.map((l,i)=>(
              <div className="lesson-row" key={i}>
                <div className={`lesson-num ${l.done?"done":"todo"}`}>{l.done?"✓":i+1}</div>
                <div className="lesson-name">{l.title}</div>
                <div className="lesson-dur">{l.dur}</div>
              </div>
            ))}

          <div style={{padding:"0 14px 16px",display:"flex",flexDirection:"column",gap:9}}>
            <button className="btn btn-gold" onClick={startQuiz}>🧠 Passer l'évaluation</button>
            {prog.progress===100&&<button className="btn btn-blue" onClick={()=>{setCert(prog);setSubView("cert");}}>🎓 Télécharger mon certificat</button>}
          </div>
        </div>
      </div>
    );
  }

  /* ── QUIZ VIEW ── */
  if(subView==="quiz"){
    const score=qAns.filter((a,i)=>a===QUIZ_BANK[i]?.ans).length;
    return(
      <div className="app">
        <div className="hdr"><div className="hdr-brand"><Logo/><div><div className="hdr-title">ALC Digital Campus</div><div className="hdr-sub">Évaluation</div></div></div><div className="hdr-avatar">KP</div></div>

          <button className="btn-back" onClick={()=>setSubView("course")}>← Cours</button>

            {!qDone?(
              <>
                <div className="quiz-header"><div className="quiz-step">Question {qStep+1}/{QUIZ_BANK.length}</div><div style={{fontSize:11,color:"#A0AEC0"}}>{qAns.filter((a,i)=>a===QUIZ_BANK[i]?.ans).length}/{qStep} correct</div></div>

              <div className="quiz-result">
                <div className="quiz-emoji">{score===QUIZ_BANK.length?"🏆":score>=3?"🎉":"💪"}</div>

                <div className="quiz-msg">{score===QUIZ_BANK.length?"Parfait !":score>=3?"Très bien !":"Continue !"}</div>

              </div>

          </div>
        </div>
      </div>

          <div style={{height:8}}/>

          {/* Forum */}
          {(!moreSection||moreSection==="forum")&&<div style={{padding:"0 14px 14px"}}>
            <div style={{background:"var(--white)",borderRadius:13,padding:13,marginBottom:12,boxShadow:"0 2px 8px rgba(27,45,91,0.06)"}}>
              <textarea className="forum-textarea" value={newPost} onChange={e=>setNewPost(e.target.value)} placeholder="Posez votre question à la communauté ALC…"/>
              <div style={{textAlign:"right",marginTop:8}}>
                <button className="btn btn-gold" style={{width:"auto",padding:"8px 18px",fontSize:12}} onClick={submitPost}>Publier</button>
              </div>
            </div>
            {posts.map(post=>(
              <div key={post.id} className="forum-post">
                <div className="post-header"><div className="post-av" style={{background:post.color}}>{post.av}</div><div><div className="post-author">{post.author}</div><div className="post-meta">{post.cat} · {post.time}</div></div></div>
                <div className="post-text">{post.text}</div>
                {post.replies.map((r,i)=>(
                  <div key={i} className={`post-reply ${r.isProf?"reply-prof":""}`}>
                    <div className="reply-author">{r.av} {r.author} {r.isProf?"👨‍🏫":""}</div>
                    <div className="reply-text">{r.text}</div>
                  </div>
                ))}
                <div className="forum-input-row">
                  <input className="forum-input" value={replyMap[post.id]||""} onChange={e=>setReplyMap(r=>({...r,[post.id]:e.target.value}))} placeholder="Répondre…"/>
                  <button className="forum-send" onClick={()=>submitReply(post.id)}>↩</button>
                </div>
              </div>
            ))}
          </div>}

          {/* Testimonials */}
          {moreSection==="testimonials"&&<div style={{padding:"0 14px 14px"}}>
            {TESTIMONIALS.map((t,i)=>(
              <div key={i} className="testimonial-card">
                <div className="testi-quote">"</div>
                <div className="testi-text">{t.text}</div>
                <Stars val={t.rating}/>
                <div style={{fontSize:10,color:"var(--gold)",fontWeight:700,marginBottom:10}}>Module : {t.prog}</div>
                <div className="testi-author"><div className="testi-av" style={{background:t.color}}>{t.name.split(" ").map(n=>n[0]).join("")}</div><div><div className="testi-name">{t.name}</div><div className="testi-role">{t.role}</div></div></div>
              </div>
            ))}
          </div>}

          {/* Alumni */}
          {moreSection==="alumni"&&<div className="card" style={{margin:"0 14px 14px"}}>
            {ALUMNI.map((a,i)=>(
              <div key={i} className="alumni-item">
                <div className="alumni-av" style={{background:a.color}}>{a.name.split(" ").map(n=>n[0]).join("")}</div>
                <div><div className="alumni-name">{a.name}</div><div className="alumni-role">{a.role} · {a.company}</div><div className="alumni-badge">{a.cert}</div></div>
              </div>
            ))}
          </div>}

          {/* Jobs */}
          {moreSection==="jobs"&&<div className="card" style={{margin:"0 14px 14px"}}>
            {JOBS.map((j,i)=>(
              <div key={i} className="job-item">
                <div className="job-title">{j.title}</div>
                <div className="job-company">🏢 {j.company} · 📍 {j.location}</div>
                <div className="job-tags">{j.tags.map((tag,ti)=><span key={ti} className="tag" style={{background:"#EEF0F8",color:"var(--blue)"}}>{tag}</span>)}</div>
              </div>
            ))}
            <div style={{padding:"8px 14px 14px"}}><button className="btn btn-gold" onClick={()=>window.open(CONTACTS.whatsapp,"_blank")}>Envoyer mon CV via WhatsApp</button></div>
          </div>}

          {/* Partners */}
          {moreSection==="partners"&&<div className="card" style={{margin:"0 14px 14px"}}>
            {PARTNERS.map((p,i)=>(
              <div key={i} className="partner-item">
                <div className="partner-logo" style={{background:p.color+"18"}}>{p.icon}</div>
                <div><div className="partner-name">{p.name}</div><div className="partner-desc">{p.desc}</div></div>
              </div>
            ))}
          </div>}

          {/* Trainers */}
          {moreSection==="trainers"&&<div style={{padding:"0 14px 14px"}}>
            {TRAINERS.map(tr=>(
              <div key={tr.id} className="trainer-card">
                <div className="trainer-header">
                  <div className="trainer-av" style={{background:tr.color}}>{tr.icon}</div>
                  <div><div className="trainer-name">{tr.name}</div><div className="trainer-title">{tr.title}</div><div className="trainer-exp">{tr.exp} · ⭐ {tr.rating}</div></div>
                </div>
                <div style={{fontSize:12,color:"#4A5568",lineHeight:1.5,marginBottom:10}}>{tr.bio}</div>
                <div className="trainer-tags">{tr.modules.map((m,i)=><span key={i} className="tag" style={{background:"#EEF0F8",color:"var(--blue)"}}>{m}</span>)}</div>
              </div>
            ))}
          </div>}
        </>}

        {/* ══ NOTIFICATIONS ══ */}
        {tab==="notifs"&&<>
          <div className="sec" style={{marginBottom:10}}><div className="sec-title">🔔 {t.notifications}</div><div className="sec-sub">{unreadCount} non lu(s)</div></div>
          <div style={{padding:"0 14px 6px",display:"flex",justifyContent:"flex-end"}}>
            <button style={{background:"none",border:"none",color:"var(--gold)",fontSize:12,fontWeight:700,cursor:"pointer"}} onClick={()=>setNotifs(n=>n.map(x=>({...x,unread:false})))}>Tout marquer comme lu</button>
          </div>
          <div className="card">
            {notifs.map(n=>(
              <div key={n.id} className={`notif-item ${n.unread?"unread":""}`} onClick={()=>setNotifs(prev=>prev.map(x=>x.id===n.id?{...x,unread:false}:x))}>
                <div className="notif-icon" style={{background:n.color}}>{n.icon}</div>
                <div style={{flex:1}}><div className="notif-title">{n.title}</div><div className="notif-text">{n.text}</div><div className="notif-time">{n.time}</div></div>
                {n.unread&&<div className="notif-dot"/>}
              </div>
            ))}
          </div>
        </>}

        {/* ══ AI ASSISTANT ══ */}
        {tab==="ai"&&(
          <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
            <div style={{padding:"12px 14px 8px",borderBottom:"1px solid #E8EEF6",background:"var(--white)"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:"var(--blue)"}}>{t.aiTitle}</div>
              <div style={{fontSize:11,color:"#718096"}}>{t.aiSub}</div>
            </div>
            <div style={{display:"flex",gap:7,padding:"8px 14px",background:"var(--bg)",overflowX:"auto"}}>
              {["C'est quoi ALC ?","Comment s'inscrire ?","Modes de paiement","Nos certifications","Contactez-nous"].map((s,i)=>(
                <button key={i} className="ai-sug" onClick={()=>sendToAI(s)}>{s}</button>
              ))}
            </div>
            <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:14}}>
              {aiMsgs.map((m,i)=>(
                <div key={i} className={`ai-msg ${m.role}`}>
                  <div className={`ai-av ${m.role}`}>{m.role==="bot"?"🤖":"KP"}</div>
                  <div className={`ai-bubble ${m.role}`}>{m.text}</div>
                </div>
              ))}
              {aiLoading&&<div className="ai-msg"><div className="ai-av bot">🤖</div><div className="ai-bubble bot"><div className="ai-typing"><span/><span/><span/></div></div></div>}
              <div ref={aiEndRef}/>
            </div>
            <div style={{padding:"10px 14px",background:"var(--white)",borderTop:"1px solid #E8EEF6",display:"flex",gap:8}}>
              <input className="ai-input" value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendToAI(aiInput)} placeholder="Posez votre question…"/>
              <button className="ai-send" onClick={()=>sendToAI(aiInput)}>➤</button>
            </div>
          </div>
        )}

        {/* ══ MORE ══ */}
        {tab==="more"&&<>
          <div className="sec" style={{marginBottom:14}}><div className="sec-title">☰ Plus</div></div>
          {/* Menu */}
          {[
            {key:"payment",icon:"💳",label:"Paiement Mobile Money",color:"#FF660018"},
            {key:"socials",icon:"🌐",label:"Réseaux Sociaux",color:"#1877F218"},
            {key:"faq",icon:"❓",label:"FAQ",color:"#C9A84C18"},
            {key:"regulations",icon:"📋",label:"Règlement Intérieur",color:"#1B2D5B18"},
            {key:"support",icon:"🎫",label:"Support & Tickets",color:"#6B46C118"},
            {key:"diagnostic",icon:"🎯",label:"Évaluation Diagnostique",color:"#1A7A4A18"},
          ].map(item=>(
            <div key={item.key} className="support-item" style={{background:moreSection===item.key?item.color:"transparent"}} onClick={()=>setMoreSection(moreSection===item.key?null:item.key)}>
              <div style={{width:38,height:38,borderRadius:10,background:item.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{item.icon}</div>
              <div style={{flex:1,fontWeight:700,fontSize:13,color:"var(--blue)"}}>{item.label}</div>
              <div style={{color:"#CBD5E0"}}>›</div>
            </div>
          ))}
          <div style={{height:10}}/>

          {/* Payment */}
          {moreSection==="payment"&&<div style={{padding:"0 14px 14px"}}>
            <div style={{fontWeight:700,fontSize:13,color:"var(--blue)",marginBottom:12}}>💳 Modes de paiement acceptés</div>
            {[
              {icon:"🟠",label:"Orange Money",num:CONTACTS.orange,bg:"#FF660015",border:"#FF6600"},
              {icon:"🔵",label:"Wave",num:CONTACTS.wave,bg:"#2196F315",border:"#2196F3"},
            ].map((m,i)=>(
              <div key={i} style={{background:m.bg,border:`2px solid ${m.border}22`,borderRadius:14,padding:16,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:26}}>{m.icon}</span>
                  <div><div style={{fontWeight:700,fontSize:14,color:"var(--blue)"}}>{m.label}</div><div style={{fontSize:12,color:"#718096"}}>Numéro de réception</div></div>
                </div>
                <div style={{background:"var(--white)",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontFamily:"monospace",fontSize:15,fontWeight:800,color:"var(--blue)"}}>{m.num}</span>
                  <button className="copy-btn" onClick={()=>copyNum(m.num)}>{copiedNum===m.num?"✓ Copié":"Copier"}</button>
                </div>
                <div style={{fontSize:11,color:"#718096",marginTop:10,lineHeight:1.6}}>
                  <strong>Instructions :</strong><br/>
                  1. Composez le code {m.icon==="🟠"?"#144#":"*407#"} sur votre téléphone<br/>
                  2. Choisissez "Transfert d'argent"<br/>
                  3. Entrez le numéro {m.num}<br/>
                  4. Saisissez le montant de votre formation<br/>
                  5. Confirmez avec votre code secret
                </div>
              </div>
            ))}
            <div style={{background:"#FFF8EE",borderRadius:12,padding:13,border:"1px solid #C9A84C33"}}>
              <div style={{fontWeight:700,fontSize:12,color:"#8B6B28",marginBottom:6}}>💬 Confirmation après paiement</div>
              <div style={{fontSize:11.5,color:"#8B6B28",lineHeight:1.6}}>Après votre paiement, envoyez une capture d'écran via WhatsApp au <strong>{CONTACTS.orange}</strong> pour activer immédiatement votre accès.</div>
              <button style={{marginTop:10,background:"#25D366",border:"none",borderRadius:10,padding:"9px 16px",color:"var(--white)",fontWeight:700,fontSize:12,cursor:"pointer",width:"100%"}} onClick={()=>window.open(CONTACTS.whatsapp,"_blank")}>📲 Envoyer ma confirmation WhatsApp</button>
            </div>
          </div>}

          {/* Socials */}
          {moreSection==="socials"&&<div style={{padding:"0 14px 14px"}}>
            <div className="social-grid">
              {[
                {label:"Facebook",icon:"📘",color:"#1877F2",bg:"#1877F215",url:CONTACTS.facebook},
                {label:"Instagram",icon:"📸",color:"#E1306C",bg:"#E1306C15",url:CONTACTS.instagram},
                {label:"YouTube",icon:"▶️",color:"#FF0000",bg:"#FF000015",url:CONTACTS.youtube},
                {label:"Telegram",icon:"✈️",color:"#0088CC",bg:"#0088CC15",url:CONTACTS.telegram},
              ].map((s,i)=>(
                <button key={i} className="social-btn" style={{background:s.bg,color:s.color,border:`2px solid ${s.color}22`}} onClick={()=>window.open(s.url,"_blank")}>
                  <span className="social-icon">{s.icon}</span>{s.label}
                </button>
              ))}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              <button style={{background:"#25D36615",border:"2px solid #25D36622",borderRadius:13,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>window.open(CONTACTS.whatsapp,"_blank")}>
                <span style={{fontSize:26}}>💬</span><div style={{textAlign:"left"}}><div style={{fontWeight:700,fontSize:13,color:"#128C7E"}}>WhatsApp</div><div style={{fontSize:11,color:"#718096"}}>{CONTACTS.wave}</div></div>
              </button>
              <button style={{background:"#FF4E4E15",border:"2px solid #FF4E4E22",borderRadius:13,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>window.open(CONTACTS.email,"_blank")}>
                <span style={{fontSize:26}}>✉️</span><div style={{textAlign:"left"}}><div style={{fontWeight:700,fontSize:13,color:"#C0392B"}}>Email</div><div style={{fontSize:11,color:"#718096"}}>ecole.alc@gmail.com</div></div>
              </button>
              <button style={{background:"var(--blue)15",border:"2px solid var(--blue)22",borderRadius:13,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>window.open(CONTACTS.maps,"_blank")}>
                <span style={{fontSize:26}}>📍</span><div style={{textAlign:"left"}}><div style={{fontWeight:700,fontSize:13,color:"var(--blue)"}}>Localisation</div><div style={{fontSize:11,color:"#718096"}}>Abidjan Songon, Côte d'Ivoire</div></div>
              </button>
            </div>
          </div>}

          {/* FAQ */}
          {moreSection==="faq"&&<div style={{padding:"0 14px 14px"}}>
            {FAQ_ITEMS.map((f,i)=>(
              <div key={i} className="faq-item">
                <div className="faq-q" onClick={()=>setFaqOpen(faqOpen===i?null:i)}>
                  <span>{f.q}</span><span style={{color:"var(--gold)",flexShrink:0}}>{faqOpen===i?"▲":"▼"}</span>
                </div>
                {faqOpen===i&&<div className="faq-a">{f.a}</div>}
              </div>
            ))}
          </div>}

          {/* Regulations */}
          {moreSection==="regulations"&&<div className="reg-section">
            <h3>📋 Règlement Intérieur ALC Institute</h3>
            {REGULATIONS.map((r,i)=>(
              <div key={i} className="reg-article">
                <div className="reg-art-title">{r.title}</div>
                <div className="reg-art-text">{r.text}</div>
              </div>
            ))}
          </div>}

          {/* Support */}
          {moreSection==="support"&&<div className="ticket-wrap">
            <div style={{background:"var(--white)",borderRadius:13,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(27,45,91,0.06)"}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--blue)",marginBottom:9}}>🎫 Nouveau ticket</div>
              <input className="pay-input" value={ticketInput} onChange={e=>setTicketInput(e.target.value)} placeholder="Décrivez votre problème…"/>
              <button className="btn btn-gold" onClick={submitTicket}>Envoyer le ticket</button>
            </div>
            <div style={{fontWeight:700,fontSize:13,color:"var(--blue)",marginBottom:9}}>Mes tickets</div>
            {tickets.map(t=>(
              <div key={t.id} className="ticket-item">
                <div className="ticket-title">{t.title}</div>
                <div className="ticket-status" style={{background:t.statusColor+"18",color:t.statusColor}}>{t.status}</div>
                <div className="ticket-date">📅 {t.date}</div>
              </div>
            ))}
          </div>}

          {/* Diagnostic */}
          {moreSection==="diagnostic"&&<div className="diag-wrap">
            <div className="diag-title">🎯 {t.diagnostic}</div>
            <div className="diag-sub">Sélectionnez votre niveau actuel pour que nous vous recommandions le parcours le plus adapté.</div>
            {[
              {icon:"🌱",name:"Débutant",desc:"Je commence dans ce domaine, peu ou pas d'expérience.",color:"#1A7A4A"},
              {icon:"⚙️",name:"Intermédiaire",desc:"J'ai déjà des bases solides et souhaite approfondir.",color:"#C9A84C"},
              {icon:"🏆",name:"Avancé",desc:"J'ai une expérience significative et vise l'expertise.",color:"#6B46C1"},
            ].map((l,i)=>(
              <div key={i} className={`level-card ${diagLevel===i?"sel":""}`} onClick={()=>setDiagLevel(i)}>
                <div className="level-icon">{l.icon}</div>
                <div className="level-name" style={{color:l.color}}>{l.name}</div>
                <div className="level-desc">{l.desc}</div>
              </div>
            ))}
            {diagLevel!==null&&(
              <button className="btn btn-gold" style={{marginTop:6}} onClick={()=>{setDiagDone(true);setMoreSection(null);setTab("learn");}}>
                Voir mon parcours recommandé →
              </button>
            )}
          </div>}

          {/* Contact info always visible at bottom */}
          {!moreSection&&<div style={{padding:"0 14px 20px"}}>
            <div style={{background:"linear-gradient(135deg,var(--blue-dark),var(--blue))",borderRadius:18,padding:20,textAlign:"center"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:"var(--white)",marginBottom:5}}>ALC Institute</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginBottom:14}}>Formation · Impact · Influence</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.65)",lineHeight:2}}>
                📍 Abidjan Songon, Côte d'Ivoire<br/>
                ✉️ ecole.alc@gmail.com<br/>
                💬 {CONTACTS.wave}<br/>
                🟠 {CONTACTS.orange}
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:16,fontSize:24}}>
                {[{e:"📘",u:CONTACTS.facebook},{e:"📸",u:CONTACTS.instagram},{e:"▶️",u:CONTACTS.youtube},{e:"✈️",u:CONTACTS.telegram}].map((s,i)=>(
                  <span key={i} style={{cursor:"pointer"}} onClick={()=>window.open(s.u,"_blank")}>{s.e}</span>
                ))}
              </div>
            </div>
          </div>}
        </>}

      </div>

      {/* BOTTOM NAV */}
      <div className="nav">
        {[
          {key:"home",icon:"🏠",label:t.home},
          {key:"learn",icon:"📚",label:t.learn},
          {key:"dash",icon:"📊",label:t.dash},
          {key:"community",icon:"👥",label:t.community},
          {key:"ai",icon:"🤖",label:t.ai},
          {key:"more",icon:"☰",label:t.more},
        ].map(n=>(
          <button key={n.key} className={`nav-btn ${tab===n.key?"on":""}`} onClick={()=>{setTab(n.key);setMoreSection(null);}}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
