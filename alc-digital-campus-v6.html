<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#07112A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ALC Digital Campus</title>
<style>@import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap");/* fonts loaded async */</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#04091A;font-family:'DM Sans',sans-serif}
:root{
  --n1:#04091A;--n2:#07112A;--n3:#112266;--n4:#1B3A8A;
  --g1:#7A4E0A;--g2:#C9A84C;--g3:#E8C96A;--g4:#FFF3C0;
  --bg:#F2F5FF;--bg2:#E8EEFF;--white:#FFFFFF;
  --gr:#0E6B3E;--rd:#B91C1C;--pu:#4C1D95;--or:#92400E;
  --t1:#0D1A3A;--t2:#374280;--t3:#7A88B8;
  --sh:0 4px 28px rgba(4,9,26,.13);--sh2:0 2px 10px rgba(4,9,26,.09);
  --r:18px;--r2:13px;--r3:9px;
  --tr:all .2s cubic-bezier(.4,0,.2,1);
}
/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse 120% 100% at 50% 0%,#0D1E50 0%,#04091A 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .7s}
#splash.out{opacity:0;pointer-events:none}
.sp-ring{position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,.12)}
.sp-r1{width:280px;height:280px;animation:spRing 8s linear infinite}
.sp-r2{width:380px;height:380px;animation:spRing 12s linear infinite reverse;border-color:rgba(201,168,76,.06)}
.sp-r3{width:480px;height:480px;animation:spRing 16s linear infinite;border-color:rgba(201,168,76,.04)}
@keyframes spRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sp-center{position:relative;text-align:center;z-index:1}
.sp-shield{filter:drop-shadow(0 0 30px rgba(201,168,76,.45));animation:spFloat 3s ease-in-out infinite}
@keyframes spFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.sp-name{font-family:'Cormorant Garamond',serif;font-size:54px;font-weight:700;color:#C9A84C;letter-spacing:6px;margin-top:18px;text-shadow:0 0 40px rgba(201,168,76,.35)}
.sp-tag{color:rgba(255,255,255,.18);font-size:10px;letter-spacing:8px;text-transform:uppercase;margin-top:6px;font-family:'DM Sans',sans-serif}
.sp-slogan{color:rgba(201,168,76,.45);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;margin-top:16px;letter-spacing:1px}
.sp-bar{width:140px;height:1.5px;background:rgba(201,168,76,.12);border-radius:2px;margin:28px auto 0;overflow:hidden}
.sp-prog{height:100%;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3));border-radius:2px;width:0;animation:spLoad 2.5s cubic-bezier(.4,0,.2,1) forwards}
@keyframes spLoad{0%{width:0;opacity:.3}100%{width:100%;opacity:1}}
/* AUTH */
#auth{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,#02060F,#04091A,#070F2E);display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.auth-box{width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:22px}
.auth-card{background:rgba(255,255,255,.97);border-radius:26px;padding:28px 22px;box-shadow:0 30px 80px rgba(4,9,26,.5),0 0 0 1px rgba(201,168,76,.18)}
.a-title{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:700;color:var(--n2);text-align:center}
.a-sub{font-size:11px;color:var(--t3);text-align:center;margin:3px 0 20px;letter-spacing:.5px}
.a-tabs{display:flex;background:var(--bg2);border-radius:12px;padding:3px;gap:3px;margin-bottom:18px}
.a-tab{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--t3);cursor:pointer;transition:var(--tr);font-family:'DM Sans',sans-serif}
.a-tab.on{background:var(--white);color:var(--n2);box-shadow:0 2px 10px rgba(4,9,26,.1)}
.a-lbl{font-size:11px;font-weight:600;color:var(--t1);display:block;margin-bottom:4px;letter-spacing:.2px}
.a-inp{width:100%;padding:12px 14px;border:2px solid #DDE4FF;border-radius:11px;font-size:13.5px;color:var(--n2);outline:none;font-family:'DM Sans',sans-serif;background:#FAFBFF;margin-bottom:11px;transition:border-color .2s}
.a-inp:focus{border-color:var(--g2)}
.btn-go{width:100%;padding:13px;background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));color:var(--n2);border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:10px;box-shadow:0 4px 18px rgba(201,168,76,.3);transition:var(--tr)}
.btn-go:active{transform:scale(.98)}
.a-or{text-align:center;color:var(--t3);font-size:11px;margin:5px 0;position:relative}
.a-or::before,.a-or::after{content:"";position:absolute;top:50%;width:40%;height:1px;background:#DDE4FF}
.a-or::before{left:0}.a-or::after{right:0}
.btn-ghost{width:100%;padding:11px;background:none;border:2px solid #DDE4FF;border-radius:12px;font-size:12.5px;color:var(--t3);font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:var(--tr)}
.btn-ghost:hover{border-color:var(--g2);color:var(--g1)}
/* APP SHELL */
#app{display:none;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}
/* HEADER */
.hdr{background:linear-gradient(135deg,#020812 0%,#04091A 50%,#07112A 100%);padding:10px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--g2);flex-shrink:0;position:relative;overflow:hidden}
.hdr::after{content:"";position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20 L40 10 L40 30Z' fill='rgba(201,168,76,0.02)'/%3E%3C/svg%3E");pointer-events:none}
.hdr-brand{display:flex;align-items:center;gap:9px;position:relative;z-index:1}
.hdr-t{color:var(--white);font-family:'Cormorant Garamond',serif;font-size:14.5px;font-weight:700;letter-spacing:.3px;line-height:1.1}
.hdr-s{color:var(--g2);font-size:6.5px;letter-spacing:4px;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:500;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:5px;position:relative;z-index:1}
.hdr-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--white);padding:6px 9px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:var(--tr);backdrop-filter:blur(4px)}
.hdr-btn:active{background:rgba(255,255,255,.16)}
.hdr-lang{color:var(--g2);font-size:9px;font-weight:700;letter-spacing:2px}
.h-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--n2);font-size:10px;border:2px solid rgba(201,168,76,.3);cursor:pointer;flex-shrink:0;font-family:'Space Mono',monospace}
.nb{position:relative}.nb::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--rd);border:1.5px solid #04091A;display:none}
.nb.on::after{display:block}
/* SEARCH */
#sBar{padding:8px 13px;background:var(--white);border-bottom:1px solid #DDE4FF;display:none;align-items:center;gap:8px;flex-shrink:0}
#sBar.show{display:flex}
#sInp{flex:1;padding:8px 12px;border:2px solid #DDE4FF;border-radius:10px;font-size:13px;color:var(--n2);outline:none;font-family:'DM Sans',sans-serif}
#sInp:focus{border-color:var(--g2)}
#sClose{background:none;border:none;font-size:18px;color:var(--t3);cursor:pointer}
#sRes{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:60;overflow-y:auto;padding:10px 13px;display:none}
#sRes.show{display:block}
/* PAGE */
.pg{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:68px}
.pg::-webkit-scrollbar{width:0}
/* NAV */
.nav{position:absolute;bottom:0;left:0;right:0;height:60px;background:var(--white);border-top:1px solid #DDE4FF;display:flex;box-shadow:0 -3px 20px rgba(4,9,26,.08);z-index:20}
.nb2{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--t3);font-size:6.5px;font-weight:600;padding:0;position:relative;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:color .18s}
.nb2.on{color:var(--g1)}
.nb2.on::before{content:"";position:absolute;top:0;left:22%;right:22%;height:2px;background:linear-gradient(90deg,var(--g1),var(--g2));border-radius:0 0 3px 3px}
.ni{font-size:17px;line-height:1;transition:transform .18s}
.nb2.on .ni{transform:translateY(-1px)}
/* REUSABLE */
.sh{padding:16px 13px 8px}
.sh-t{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--n2);line-height:1.1}
.sh-s{font-size:11px;color:var(--t3);margin-top:2px}
.card{background:var(--white);border-radius:var(--r2);margin:0 13px 11px;box-shadow:var(--sh2);overflow:hidden}
.chd{padding:12px 13px 9px;font-weight:700;font-size:12.5px;color:var(--n2);border-bottom:1px solid #EEF2FF;display:flex;align-items:center;gap:6px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;font-family:'Space Mono',monospace}
.btn-gold{width:100%;padding:13px;background:linear-gradient(135deg,var(--g1),var(--g2));color:var(--n2);border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(201,168,76,.22);transition:var(--tr)}
.btn-gold:active{transform:scale(.98)}
.btn-navy{width:100%;padding:12px;background:linear-gradient(135deg,var(--n2),var(--n4));color:var(--white);border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:var(--tr)}
.btn-back{background:none;border:none;color:var(--t3);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;padding:12px 13px 6px;font-family:'DM Sans',sans-serif}
.inp{width:100%;padding:11px 13px;border:2px solid #DDE4FF;border-radius:11px;font-size:13px;color:var(--n2);outline:none;font-family:'DM Sans',sans-serif;background:#FAFBFF;margin-bottom:8px;transition:border-color .2s}
.inp:focus{border-color:var(--g2);background:var(--white)}
.sel{width:100%;padding:11px 13px;border:2px solid #DDE4FF;border-radius:11px;font-size:13px;color:var(--n2);outline:none;font-family:'DM Sans',sans-serif;background:#FAFBFF;margin-bottom:8px}
.sel:focus{border-color:var(--g2)}
/* HOME */
.hero{margin:11px 13px 10px;padding:20px 16px;border-radius:20px;background:linear-gradient(145deg,#020812 0%,#04091A 50%,#07112A 80%,#0D1E50 100%);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,76,.07),transparent 70%);border-radius:50%}
.hero::after{content:"";position:absolute;bottom:-40px;left:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(27,58,138,.35),transparent 70%);border-radius:50%}
.hero-g{color:rgba(255,255,255,.38);font-size:10.5px;font-weight:300;letter-spacing:.5px}
.hero-n{color:var(--white);font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;margin-top:2px;position:relative}
.hero-stats{display:flex;gap:6px;margin-top:14px;position:relative}
.hstat{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 5px;text-align:center;backdrop-filter:blur(4px)}
.hstat-v{color:var(--g2);font-size:19px;font-weight:700;font-family:'Cormorant Garamond',serif;line-height:1}
.hstat-l{color:rgba(255,255,255,.3);font-size:7px;margin-top:2px;font-weight:500;letter-spacing:.5px}
.ctr{margin:0 13px 11px;padding:12px 15px;border-radius:16px;background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));display:flex;justify-content:space-around;position:relative;overflow:hidden;box-shadow:0 6px 22px rgba(201,168,76,.22)}
.ctr::before{content:"";position:absolute;top:-20px;right:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.07)}
.cv{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:var(--n2);text-align:center;line-height:1}
.cl{font-size:7.5px;font-weight:700;color:rgba(4,9,26,.5);text-align:center;margin-top:2px;letter-spacing:.5px}
.news-row{display:flex;gap:9px;padding:4px 13px 10px;overflow-x:auto}
.news-row::-webkit-scrollbar{height:0}
.nc{flex-shrink:0;width:175px;border-radius:14px;overflow:hidden;box-shadow:var(--sh2);background:var(--white)}
.nc-img{height:75px;display:flex;align-items:center;justify-content:center;font-size:30px}
.nc-b{padding:9px 10px}
.nc-cat{font-size:7.5px;font-weight:700;color:var(--g1);letter-spacing:2px;text-transform:uppercase;font-family:'Space Mono',monospace}
.nc-t{font-size:11px;font-weight:600;color:var(--n2);margin-top:3px;line-height:1.35}
.nc-d{font-size:9px;color:var(--t3);margin-top:2px}
.cat-item{display:flex;align-items:center;gap:9px;margin:0 13px 7px;padding:12px;border-radius:13px;background:var(--white);box-shadow:var(--sh2);cursor:pointer;border-left:4px solid transparent;transition:var(--tr)}
.cat-item.op{border-left-color:var(--g2);background:#FFFDF5}
.c-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.c-nm{font-weight:700;font-size:12.5px;color:var(--n2)}
.c-cn{font-size:9.5px;color:var(--t3);margin-top:1px}
.c-ar{margin-left:auto;color:var(--t3);font-size:14px;transition:transform .22s}
.cat-item.op .c-ar{transform:rotate(90deg);color:var(--g2)}
.sub-wrap{margin:0 13px 6px;padding-left:12px;border-left:2px solid rgba(201,168,76,.18)}
.sub-item{background:#F8FAFF;border-radius:10px;padding:9px 11px;margin-bottom:5px;cursor:pointer;border:1.5px solid #DDE4FF;transition:var(--tr)}
.sub-item:hover{border-color:rgba(201,168,76,.3)}
.s-nm{font-weight:700;font-size:11.5px;color:var(--n2)}
.s-cn{font-size:9px;color:var(--t3);margin-top:1px}
.s-ar{float:right;color:var(--t3);font-size:11px}
.mod-row{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:4px;border-radius:9px;background:var(--white);border:1.5px solid #DDE4FF;cursor:pointer;transition:var(--tr)}
.mod-row:hover{border-color:rgba(201,168,76,.3);transform:translateX(2px)}
.m-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.m-nm{flex:1;font-size:11.5px;color:var(--n2);font-weight:500}
.m-pr{font-size:10px;font-weight:700;color:var(--g1);font-family:'Space Mono',monospace}
.m-ok{font-size:10px;font-weight:700;color:var(--gr);font-family:'Space Mono',monospace}
.promo{margin:0 13px 15px;padding:18px 16px;border-radius:16px;background:linear-gradient(135deg,var(--n2),var(--n4));position:relative;overflow:hidden}
.promo::before{content:"";position:absolute;top:-25px;right:-25px;width:110px;height:110px;border-radius:50%;background:rgba(201,168,76,.05)}
.pr-tag{font-size:8px;font-weight:700;color:var(--g2);letter-spacing:2.5px;text-transform:uppercase;font-family:'Space Mono',monospace}
.pr-t{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--white);margin:6px 0 5px;line-height:1.2}
.pr-s{font-size:11.5px;color:rgba(255,255,255,.45);line-height:1.5;margin-bottom:12px}
.pr-btn{background:var(--g2);border:none;border-radius:9px;padding:9px 16px;color:var(--n2);font-size:11.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
/* LEARN */
.pnode{display:flex;align-items:center;gap:12px;margin-bottom:18px;position:relative}
.pnode::after{content:"";position:absolute;left:33px;bottom:-18px;width:2px;height:18px;background:rgba(201,168,76,.15)}
.pnode:last-child::after{display:none}
.pcirc{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:3px solid transparent;transition:var(--tr)}
.pcirc.done{background:var(--n2);border-color:var(--g2);box-shadow:0 0 0 3px rgba(201,168,76,.12)}
.pcirc.act{background:var(--g2);border-color:var(--g1);box-shadow:0 0 12px rgba(201,168,76,.35)}
.pcirc.lck{background:#EEF2FF;border-color:#DDE4FF}
.p-nm{font-weight:700;font-size:13px;color:var(--n2)}
.p-st{font-size:10px;margin-top:2px}
.lib-r{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid #EEF2FF;cursor:pointer}
.l-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.vid-r{padding:11px 13px;border-bottom:1px solid #EEF2FF;cursor:pointer}
.v-th{height:85px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:7px;position:relative;overflow:hidden}
.v-play{position:absolute;width:38px;height:38px;border-radius:50%;background:rgba(201,168,76,.88);display:flex;align-items:center;justify-content:center;font-size:13px}
.cal-r{display:flex;gap:12px;padding:11px 13px;border-bottom:1px solid #EEF2FF;align-items:center}
.c-day{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--n2);line-height:1;text-align:center;width:34px;flex-shrink:0}
.c-mo{font-size:8px;font-weight:700;color:var(--g1);text-transform:uppercase;font-family:'Space Mono',monospace;text-align:center}
.sess-c{border:2px solid #DDE4FF;border-radius:13px;padding:12px;margin-bottom:8px;cursor:pointer;transition:var(--tr)}
.sess-c.sel{border-color:var(--g2);background:rgba(201,168,76,.04)}
.web-c{background:var(--white);border-radius:13px;margin:0 13px 9px;box-shadow:var(--sh2);overflow:hidden}
.web-live{background:var(--rd);color:#fff;font-size:8px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:'Space Mono',monospace;animation:lp 2s ease infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.55}}
/* DASH */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 13px 11px}
.dc{background:var(--white);border-radius:14px;padding:13px 12px;box-shadow:var(--sh2);border-top:3px solid var(--g2)}
.dc-ico{font-size:21px;margin-bottom:4px}
.dc-v{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:700;color:var(--n2);line-height:1}
.dc-l{font-size:10px;color:var(--t3);margin-top:2px}
.gb{background:var(--white);margin:0 13px 11px;border-radius:14px;padding:13px;box-shadow:var(--sh2)}
.bars{display:flex;align-items:flex-end;gap:4px;height:78px}
.bar{flex:1;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--g3),var(--g2),var(--g1));min-width:0}
.bl{font-size:7px;color:var(--t3);text-align:center;margin-top:2px;font-family:'Space Mono',monospace}
.ac{background:var(--white);margin:0 13px 11px;border-radius:14px;padding:13px;box-shadow:var(--sh2)}
.ar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #EEF2FF}
.ar:last-child{border-bottom:none}
.badge-row{display:flex;gap:8px;padding:11px 13px;overflow-x:auto}
.badge-row::-webkit-scrollbar{height:0}
.bi{flex-shrink:0;text-align:center;width:62px}
.bc{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;margin:0 auto 3px}
.bc.on{background:linear-gradient(135deg,var(--g1),var(--g2));box-shadow:0 3px 12px rgba(201,168,76,.25)}
.bc.off{background:#EEF2FF;filter:grayscale(1);opacity:.35}

  (payM?'<div style="margin-top:13px"><label style="font-size:12px;font-weight:700;color:var(--n2);display:block;margin-bottom:7px">📱 Votre numéro Mobile Money</label><input class="inp" id="pPh" placeholder="Ex : 07 00 00 00 00"><div class="p-info"><div style="font-weight:700;font-size:12px;color:var(--or);margin-bottom:5px">Instructions :</div><div style="font-size:11.5px;color:var(--or);line-height:1.7">1. Envoyez '+p.price.toLocaleString()+' FCFA au '+(payM==="om"?CO.om:CO.wv)+'<br>2. Entrez votre numéro ci-dessus<br>3. Confirmez le paiement</div></div><button class="btn-gold" onclick="confirmPay(\''+p.id+'\')">✅ Confirmer le paiement</button></div>':"")+
  '</div>';}
function confirmPay(id){const ph=document.getElementById("pPh");if(!ph||!ph.value.trim()){alert("Veuillez entrer votre numéro");return;}progs[id].enr=true;progs[id].pct=10;pProg=progs[id];render();}

// ═══ QUIZ ═══
function startQuiz(){qStep=0;qAns=[];qSel=null;qDone=false;tab="quiz";render();}
function rQuiz(){if(qDone){const sc=qAns.filter((a,i)=>a===QUIZ[i].a).length,pct=Math.round(sc/QUIZ.length*100);return'<button class="btn-back" onclick="tab=\'course\';render()">← Cours</button><div style="padding:20px 13px;text-align:center"><div style="font-size:70px;margin-bottom:12px">'+(sc===QUIZ.length?"🏆":sc>=3?"🎉":"💪")+'</div><div style="font-family:\'Cormorant Garamond\',serif;font-size:44px;font-weight:700;color:var(--n2)">'+sc+'/'+QUIZ.length+'</div><div style="font-size:16px;font-weight:700;color:'+(sc>=3?"#0E6B3E":"var(--g1)")+';margin:8px 0">'+(sc===QUIZ.length?"Parfait !":sc>=3?"Très bien !":"Continue !")+'</div><div style="font-size:13px;color:var(--t3);margin-bottom:22px">'+pct+'% — '+(sc>=3?"Module validé !":"Relisez le cours et réessayez.")+'</div><button class="btn-gold" style="margin-bottom:10px" onclick="startQuiz()">🔄 Recommencer</button>'+(sc>=3?'<button class="btn-navy" onclick="completeM()">🎓 Obtenir mon certificat</button>':'<button class="btn-navy" onclick="tab=\'course\';render()">Retour au cours</button>')+'</div>';}
  const q=QUIZ[qStep];return'<button class="btn-back" onclick="tab=\'course\';render()">← Cours</button><div style="padding:13px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:var(--n2)">Question '+(qStep+1)+'/'+QUIZ.length+'</div><div style="font-size:11px;color:var(--t3)">'+qAns.filter((a,i)=>a===QUIZ[i].a).length+'/'+qStep+' correct</div></div><div style="height:3.5px;background:#EEF2FF;border-radius:3px;margin-bottom:15px;overflow:hidden"><div style="height:100%;background:var(--g2);width:'+((qStep/QUIZ.length)*100)+'%;border-radius:3px"></div></div><div style="font-size:14px;font-weight:700;color:var(--n2);margin-bottom:15px;line-height:1.4">'+q.q+'</div>'+q.o.map((opt,i)=>{let cl="qo",d="";if(qSel!==null){if(i===q.a)cl+=" ok";else if(i===qSel)cl+=" ng";d="disabled";}return'<button class="'+cl+'" '+d+' onclick="ansQ('+i+')">'+'<b style="margin-right:7px">'+"ABCD"[i]+'.</b>'+opt+'</button>';}).join("")+'</div>';}
function ansQ(i){if(qSel!==null)return;qSel=i;render();setTimeout(()=>{qAns.push(i);if(qStep+1<QUIZ.length){qStep++;qSel=null;}else qDone=true;render();},700);}
function completeM(){if(aCourse){progs[aCourse.id].pct=100;cProg=progs[aCourse.id];tab="cert";render();}}

// ═══ CERT ═══
function rCert(){const p=cProg;if(!p)return'<button class="btn-back" onclick="goTab(\'dash\')">← Retour</button>';
  const num="ALC-"+p.id.toUpperCase()+"-2025",dateStr=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}),shareT=encodeURIComponent("🎓 Je viens d'obtenir ma certification en \""+p.t+"\" à l'ALC Institute ! #ALCInstitute #Formation");
  return '<button class="btn-back" onclick="goTab(\'dash\')">← Retour</button><div style="padding:0 13px 16px">'+
  '<div class="cc" id="ccEl">'+
    '<svg viewBox="0 0 80 90" width="46" height="52" fill="none" style="margin:0 auto 9px"><path d="M40 4L74 18V50C74 67 58 78 40 86C22 78 6 67 6 50V18Z" fill="#07112A" stroke="#C9A84C" stroke-width="2.5"/><text x="40" y="57" text-anchor="middle" fill="white" font-size="26" font-weight="bold" font-family="Georgia,serif">A</text><polygon points="40,19 43,25 50,25 45,29 47,36 40,32 33,36 35,29 30,25 37,25" fill="#C9A84C"/></svg>'+
    '<div class="cc-inst">ALC Institute — Abidjan, Côte d\'Ivoire</div>'+
    '<div class="cc-slogan" style="font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:2px;font-family:\'DM Sans\',sans-serif">Formation · Impact · Influence</div>'+
    '<div style="font-size:12px;color:var(--t3);margin:13px 0 4px">Ce certificat est décerné à</div>'+
    '<div class="cc-name">'+uNm+'</div>'+
    '<div style="width:120px;height:1.5px;background:var(--g2);margin:6px auto"></div>'+
    '<div style="font-size:11px;color:var(--t3);margin:9px 0 5px">pour avoir complété avec succès</div>'+
    '<div class="cc-mod">'+p.t+'</div>'+
    '<div style="font-size:10.5px;color:var(--t3);margin-top:4px">'+p.cIco+' '+(p.cNm[lng]||p.cNm.fr)+'</div>'+
    '<hr class="cc-div">'+
    '<div class="cc-stats">'+
      '<div><div class="cc-sv">2025</div><div class="cc-sl">Année</div></div>'+
      '<div><div class="cc-sv" style="font-size:9.5px">'+num+'</div><div class="cc-sl">Numéro</div></div>'+
      '<div><div class="cc-sv">'+p.hrs+'h</div><div class="cc-sl">Durée</div></div>'+
      '<div><div class="cc-sv" style="font-size:11px">'+p.lvl+'</div><div class="cc-sl">Niveau</div></div>'+
    '</div>'+
    '<div class="cc-sig"><div style="font-family:\'Cormorant Garamond\',serif;font-size:18px;color:var(--n2);font-style:italic;margin-bottom:2px">Kan Parfait Kouamé</div><div style="font-size:10px;font-weight:700;color:var(--n2)">Directeur Académique</div><div style="font-size:9px;color:var(--t3)">ALC Institute</div></div>'+
    '<div id="qrCert" style="display:flex;justify-content:center;margin:11px 0 5px"></div>'+
    '<div style="font-size:8px;color:var(--t3);font-family:\'Space Mono\',monospace">Délivré le '+dateStr+' · Scannez pour vérifier</div>'+
  '</div>'+
  '<div style="margin-top:11px;display:flex;flex-direction:column;gap:8px">'+
    '<button class="btn-gold" onclick="dlCert(\''+p.id+'\')">⬇️ Télécharger le certificat (PNG)</button>'+
    '<button class="btn-navy" onclick="window.print()">🖨️ Imprimer</button>'+
  '</div>'+
  '<div style="margin-top:10px"><div style="font-size:12px;font-weight:700;color:var(--n2);margin-bottom:8px">📤 Partager</div>'+
  '<div style="display:flex;gap:7px">'+
    '<button class="sh-btn" style="background:#1877F222;color:#1877F2" onclick="window.open(\'https://www.linkedin.com/sharing/share-offsite/?url=https://alc-institute.com\',\'_blank\')">🔗 LinkedIn</button>'+
    '<button class="sh-btn" style="background:#25D36622;color:#1B5E20" onclick="window.open(\'https://wa.me/?text='+shareT+'\',\'_blank\')">💬 WhatsApp</button>'+
    '<button class="sh-btn" style="background:#07112A22;color:var(--n2)" onclick="window.open(\'https://www.facebook.com/sharer/sharer.php?u=https://alc-institute.com\',\'_blank\')">📘 Facebook</button>'+
  '</div></div>'+
  '<div style="margin-top:10px"><button class="btn-back" style="width:100%;justify-content:center;border:2px solid #DDE4FF;border-radius:12px;padding:11px" onclick="goTab(\'dash\')">← Tableau de bord</button></div>'+

function renderQR(txt){const d=document.getElementById("qrCert");if(!d||!window.QRCode)return;d.innerHTML="";try{new QRCode(d,{text:txt||"ALC-CERT",width:64,height:64,colorDark:"#07112A",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});}catch(e){}}

function render(){const pg=document.getElementById("pg");if(!pg)return;const map={home:rHome,learn:rLearn,dash:rDash,community:rComm,notifs:rNotifs,ai:rAI,more:rMore,course:rCourse,pay:rPay,cert:rCert,quiz:rQuiz};if(map[tab]){pg.innerHTML=map[tab]();}pg.scrollTop=0;if(tab==="ai")scrollAI();if(tab==="cert"&&cProg){setTimeout(()=>renderQR("ALC-"+cProg.id.toUpperCase()+"-2025-VERIFIED"),120);}}

function dlCert(pid){const p=progs[pid];if(!p)return;const cv=document.getElementById("cc2"),W=900,H=640;cv.width=W;cv.height=H;const ctx=cv.getContext("2d");
  ctx.fillStyle="#FFFFFF";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#C9A84C";ctx.lineWidth=10;ctx.strokeRect(5,5,W-10,H-10);
  ctx.strokeStyle="#07112A";ctx.lineWidth=2.5;ctx.strokeRect(18,18,W-36,H-36);
  ctx.strokeStyle="#C9A84C";ctx.lineWidth=1.5;const cors=[[26,26,72,26,26,72],[W-26,26,W-72,26,W-26,72],[26,H-26,72,H-26,26,H-72],[W-26,H-26,W-72,H-26,W-26,H-72]];cors.forEach(([x1,y1,x2,y2,x3,y3])=>{ctx.beginPath();ctx.moveTo(x2,y1);ctx.lineTo(x1,y1);ctx.lineTo(x1,y2);ctx.stroke();});
  const g=ctx.createLinearGradient(0,0,W,0);g.addColorStop(0,"#020812");g.addColorStop(.5,"#07112A");g.addColorStop(1,"#112266");ctx.fillStyle=g;ctx.fillRect(26,26,W-52,85);
  ctx.fillStyle="#C9A84C";ctx.font="bold 12px Arial";ctx.textAlign="center";ctx.fillText("ALC INSTITUTE  ·  FORMATION · IMPACT · INFLUENCE  ·  ABIDJAN SONGON",W/2,62);
  ctx.fillStyle="rgba(255,255,255,.38)";ctx.font="10px Arial";ctx.fillText("ecole.alc@gmail.com  ·  +225 0141234600",W/2,86);
  ctx.fillStyle="#C9A84C";ctx.font="bold 13px Arial";ctx.fillText("✦ CERTIFICAT DE FORMATION PROFESSIONNELLE ✦",W/2,148);
  ctx.fillStyle="#7A88B8";ctx.font="13px Arial";ctx.fillText("Ce certificat est décerné à",W/2,190);
  ctx.fillStyle="#07112A";ctx.font="bold 38px Georgia";ctx.fillText(uNm,W/2,238);
  const nW=ctx.measureText(uNm).width;ctx.strokeStyle="#C9A84C";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W/2-nW/2,246);ctx.lineTo(W/2+nW/2,246);ctx.stroke();
  ctx.fillStyle="#7A88B8";ctx.font="13px Arial";ctx.fillText("pour avoir complété avec succès la formation",W/2,278);
  ctx.fillStyle="#7A4E0A";ctx.font="bold 22px Georgia";const wds=p.t.split(" ");let ln="",lns=[];wds.forEach(w=>{const tt=ln+w+" ";if(ctx.measureText(tt).width>680&&ln){lns.push(ln.trim());ln=w+" ";}else ln=tt;});lns.push(ln.trim());lns.forEach((l,i)=>ctx.fillText(l,W/2,308+i*29));
  const aT=308+lns.length*29+4;ctx.fillStyle="#7A88B8";ctx.font="12px Arial";ctx.fillText(p.cIco+" "+(p.cNm.fr),W/2,aT+18);
  ctx.strokeStyle="#EEF2FF";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(80,aT+36);ctx.lineTo(W-80,aT+36);ctx.stroke();
  const sY=aT+78,cols=[W*.18,W*.38,W*.58,W*.78],vls=["2025","ALC-"+p.id.toUpperCase()+"-2025",p.hrs+"h",p.lvl],lls=["Année","Numéro","Durée","Niveau"];cols.forEach((x,i)=>{ctx.fillStyle="#07112A";ctx.font="bold 14px Arial";ctx.fillText(vls[i],x,sY);ctx.fillStyle="#9BA8CC";ctx.font="10px Arial";ctx.fillText(lls[i],x,sY+15);});
  ctx.strokeStyle="#EEF2FF";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(80,sY+34);ctx.lineTo(W-80,sY+34);ctx.stroke();
  ctx.fillStyle="#07112A";ctx.font="italic 20px Georgia";ctx.fillText("Kan Parfait Kouamé",W/2,sY+62);ctx.fillStyle="#9BA8CC";ctx.font="10px Arial";ctx.fillText("Directeur Académique · ALC Institute",W/2,sY+79);
  ctx.fillStyle="#9BA8CC";ctx.font="10px Arial";ctx.fillText("Délivré le "+new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})+" · Certifié ALC Institute",W/2,H-30);
  const lk=document.createElement("a");lk.download="Certificat-ALC-"+p.t.replace(/\s+/g,"-").replace(/[^a-zA-Z0-9\-]/g,"")+".png";lk.href=cv.toDataURL("image/png",1);lk.click();}

function dlTranscript(){const enr=Object.values(progs).filter(p=>p.enr);if(!enr.length){alert("Aucune formation inscrite.");return;}const cv=document.getElementById("cc2"),W=800,H=Math.max(500,180+enr.length*50+80);cv.width=W;cv.height=H;const ctx=cv.getContext("2d");
  ctx.fillStyle="#F2F5FF";ctx.fillRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,W,0);g.addColorStop(0,"#07112A");g.addColorStop(1,"#1B3A8A");ctx.fillStyle=g;ctx.fillRect(0,0,W,90);
  ctx.fillStyle="#C9A84C";ctx.font="bold 22px Georgia";ctx.textAlign="center";ctx.fillText("TRANSCRIPT ACADÉMIQUE",W/2,38);
  ctx.fillStyle="rgba(255,255,255,.5)";ctx.font="12px Arial";ctx.fillText(uNm+" · ALC Institute · "+new Date().getFullYear(),W/2,62);ctx.fillText("ecole.alc@gmail.com  ·  Abidjan Songon, CI",W/2,80);
  ctx.strokeStyle="#C9A84C";ctx.lineWidth=1;ctx.fillStyle="#07112A";ctx.font="bold 11px Arial";ctx.textAlign="left";ctx.fillText("FORMATION",50,118);ctx.textAlign="center";ctx.fillText("FILIÈRE",W/2,118);ctx.textAlign="right";ctx.fillText("HEURES",W-160,118);ctx.fillText("NIVEAU",W-70,118);ctx.fillStyle="#C9A84C";ctx.textAlign="center";ctx.fillText("STATUT",W/2+180,118);ctx.beginPath();ctx.moveTo(40,125);ctx.lineTo(W-40,125);ctx.stroke();
  enr.forEach((p,i)=>{const y=148+i*46,even=i%2===0;ctx.fillStyle=even?"rgba(7,17,42,.04)":"rgba(255,255,255,.6)";ctx.fillRect(38,y-14,W-76,40);ctx.fillStyle="#0D1A3A";ctx.font="bold 12px Arial";ctx.textAlign="left";ctx.fillText(p.t.length>38?p.t.substring(0,35)+"…":p.t,50,y+4);ctx.fillStyle="#7A88B8";ctx.font="10px Arial";ctx.textAlign="center";ctx.fillText(p.cNm.fr.length>22?p.cNm.fr.substring(0,19)+"…":p.cNm.fr,W/2,y+4);ctx.textAlign="right";ctx.fillText(p.hrs+"h",W-160,y+4);ctx.fillText(p.lvl,W-70,y+4);ctx.fillStyle=p.pct===100?"#0E6B3E":"#7A4E0A";ctx.font="bold 10px Arial";ctx.textAlign="center";ctx.fillText(p.pct===100?"✅ Certifié":"🔥 "+p.pct+"%",W/2+180,y+4);});
  const tY=148+enr.length*46+20;ctx.strokeStyle="#C9A84C";ctx.beginPath();ctx.moveTo(40,tY);ctx.lineTo(W-40,tY);ctx.stroke();ctx.fillStyle="#07112A";ctx.font="bold 13px Arial";ctx.textAlign="left";ctx.fillText("Total : "+enr.reduce((s,p)=>s+p.hrs,0)+"h de formation · "+enr.filter(p=>p.pct===100).length+" certifications validées",50,tY+22);ctx.fillStyle="#9BA8CC";ctx.font="10px Arial";ctx.fillText("Émis le "+new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})+" · ALC Institute · ecole.alc@gmail.com",50,tY+42);
  const lk=document.createElement("a");lk.download="Transcript-ALC-"+uNm.replace(/\s+/g,"-")+".png";lk.href=cv.toDataURL("image/png",1);lk.click();}
</script>
