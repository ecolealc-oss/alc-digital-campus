<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ALC Digital Campus</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:"DM Sans",sans-serif;background:#0D1B2A}
:root{--blue:#1B2D5B;--dark:#0D1B2A;--mid:#2A468A;--gold:#C9A84C;--gold2:#F0D98C;--gold3:#8B6B28;--bg:#F2F5FA;--white:#fff;--green:#1A7A4A;--red:#C0392B}

/* SPLASH */
#splash{position:fixed;inset:0;background:#0D1B2A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.sp-logo{font-family:"Playfair Display",serif;font-size:52px;color:#C9A84C;font-weight:900;letter-spacing:3px}
.sp-sub{color:rgba(201,168,76,.5);font-size:10px;letter-spacing:6px;text-transform:uppercase;margin-top:8px}
.sp-tag{color:rgba(255,255,255,.2);font-size:12px;margin-top:16px;font-style:italic}
.sp-bar{width:150px;height:3px;background:rgba(201,168,76,.2);border-radius:2px;margin-top:24px;overflow:hidden}
.sp-fill{height:100%;background:#C9A84C;animation:fill 2.5s ease forwards}
@keyframes fill{from{width:0}to{width:100%}}

/* AUTH */
#auth{position:fixed;inset:0;background:linear-gradient(160deg,#0D1B2A,#1B2D5B,#2A468A);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;display:none}
.auth-card{background:#fff;border-radius:24px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.auth-logo{text-align:center;margin-bottom:16px}
.auth-logo svg{width:52px;height:52px}
.auth-h{font-family:"Playfair Display",serif;font-size:22px;font-weight:900;color:#1B2D5B;text-align:center;margin-bottom:4px}
.auth-s{font-size:12px;color:#718096;text-align:center;margin-bottom:20px}
.tab-row{display:flex;background:#F2F5FA;border-radius:12px;padding:4px;margin-bottom:18px}
.tab-btn{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-size:13px;font-weight:700;color:#A0AEC0;cursor:pointer;transition:all .2s;font-family:"DM Sans",sans-serif}
.tab-btn.on{background:#fff;color:#1B2D5B;box-shadow:0 2px 8px rgba(27,45,91,.1)}
.auth-lbl{font-size:11.5px;font-weight:700;color:#1B2D5B;margin-bottom:5px;display:block}
.auth-inp{width:100%;padding:12px 14px;border:2px solid #E8EEF6;border-radius:12px;font-size:14px;color:#1B2D5B;outline:none;margin-bottom:12px;font-family:"DM Sans",sans-serif;transition:border-color .2s}
.auth-inp:focus{border-color:#C9A84C}
.btn-gold{background:linear-gradient(135deg,#8B6B28,#C9A84C);color:#0D1B2A;border:none;border-radius:12px;padding:13px;font-size:13px;font-weight:700;width:100%;cursor:pointer;font-family:"DM Sans",sans-serif;margin-bottom:10px}
.btn-blue{background:linear-gradient(135deg,#1B2D5B,#2A468A);color:#fff;border:none;border-radius:12px;padding:13px;font-size:13px;font-weight:700;width:100%;cursor:pointer;font-family:"DM Sans",sans-serif;margin-bottom:10px}
.divider{text-align:center;color:#A0AEC0;font-size:11px;margin:10px 0;position:relative}
.divider::before,.divider::after{content:"";position:absolute;top:50%;width:40%;height:1px;background:#E8EEF6}
.divider::before{left:0}.divider::after{right:0}
.btn-guest{background:none;border:2px solid #E8EEF6;border-radius:12px;width:100%;padding:11px;font-size:13px;color:#718096;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif}

/* APP */
#app{display:none;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:#F2F5FA;position:relative;overflow:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0D1B2A,#1B2D5B);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #C9A84C;flex-shrink:0}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-title{color:#fff;font-family:"Playfair Display",serif;font-size:14px;font-weight:900;line-height:1.1}
.hdr-sub{color:#C9A84C;font-size:7px;letter-spacing:3px;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:7px}
.hdr-btn{background:rgba(255,255,255,.12);border:none;border-radius:8px;color:#fff;font-size:13px;padding:5px 7px;cursor:pointer;font-family:"DM Sans",sans-serif}
.hdr-lang{color:#C9A84C;font-size:10px;font-weight:700;letter-spacing:1px}
.hdr-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#8B6B28,#C9A84C);display:flex;align-items:center;justify-content:center;font-weight:900;color:#0D1B2A;font-size:11px;border:2px solid rgba(201,168,76,.4);cursor:pointer;flex-shrink:0}
.notif-wrap{position:relative}
.notif-badge{position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:#C0392B;border:1.5px solid #0D1B2A}

/* SEARCH */
#searchBar{padding:9px 14px;background:#fff;border-bottom:1px solid #E8EEF6;display:none;gap:8px;align-items:center}
#searchBar.show{display:flex}
#searchInput{flex:1;padding:8px 12px;border:2px solid #E8EEF6;border-radius:10px;font-size:13px;color:#1B2D5B;outline:none;font-family:"DM Sans",sans-serif}
#searchInput:focus{border-color:#C9A84C}
#searchResults{position:absolute;background:#F2F5FA;top:0;left:0;right:0;bottom:0;z-index:50;overflow-y:auto;padding:8px 14px;display:none}
#searchResults.show{display:block}

/* PAGE */
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:68px}
.page::-webkit-scrollbar{width:0}

/* NAV */
.nav{position:absolute;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid #E0E6F0;display:flex;box-shadow:0 -4px 20px rgba(27,45,91,.08);z-index:10}
.nav-btn{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#A0AEC0;font-size:7.5px;font-weight:700;padding:0 2px;position:relative;font-family:"DM Sans",sans-serif;transition:color .2s}
.nav-btn.on{color:#C9A84C}
.nav-btn.on::before{content:"";position:absolute;top:0;left:15%;right:15%;height:2.5px;background:#C9A84C;border-radius:0 0 4px 4px}
.nav-icon{font-size:17px;line-height:1}

/* SHARED */
.sec{padding:14px 14px 4px}
.sec-h{font-family:"Playfair Display",serif;font-size:17px;font-weight:700;color:#1B2D5B}
.sec-s{font-size:11px;color:#718096;margin-top:2px}
.card{background:#fff;border-radius:15px;margin:0 14px 12px;box-shadow:0 2px 12px rgba(27,45,91,.07);overflow:hidden}
.card-t{padding:11px 14px 9px;font-weight:700;font-size:13px;color:#1B2D5B;border-bottom:1px solid #F0F2F8}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:9.5px;font-weight:700}

/* HOME */
.hero{margin:12px 14px 10px;padding:18px 15px;border-radius:18px;background:linear-gradient(135deg,#0D1B2A,#1B2D5B,#2A468A)}
.hero-name{color:rgba(255,255,255,.45);font-size:11px}
.hero-user{color:#fff;font-family:"Playfair Display",serif;font-size:17px;font-weight:700;margin-top:2px}
.hero-row{display:flex;gap:7px;margin-top:11px}
.hero-stat{flex:1;background:rgba(255,255,255,.08);border-radius:10px;padding:9px 4px;text-align:center}
.hero-val{color:#C9A84C;font-size:19px;font-weight:900;font-family:"Playfair Display",serif}
.hero-lbl{color:rgba(255,255,255,.4);font-size:8px;margin-top:1px}
.counter{margin:0 14px 12px;padding:12px;border-radius:14px;background:linear-gradient(135deg,#8B6B28,#C9A84C);display:flex;justify-content:space-around}
.ctr-v{font-family:"Playfair Display",serif;font-size:21px;font-weight:900;color:#0D1B2A;text-align:center}
.ctr-l{font-size:8.5px;font-weight:700;color:rgba(13,27,42,.6);text-align:center;margin-top:1px}

/* NEWS */
.news-row{display:flex;gap:10px;padding:6px 14px 4px;overflow-x:auto}
.news-row::-webkit-scrollbar{height:0}
.news-card{flex-shrink:0;width:190px;border-radius:13px;overflow:hidden;box-shadow:0 2px 10px rgba(27,45,91,.1)}
.news-img{height:80px;display:flex;align-items:center;justify-content:center;font-size:34px}
.news-body{background:#fff;padding:9px 11px}
.news-tag2{font-size:8.5px;font-weight:700;color:#C9A84C;letter-spacing:1px;text-transform:uppercase}
.news-title{font-size:11.5px;font-weight:700;color:#1B2D5B;margin-top:3px;line-height:1.3}
.news-date{font-size:9.5px;color:#A0AEC0;margin-top:3px}

/* CATALOGUE */
.cat-card{margin:0 14px 8px;padding:11px 12px;border-radius:13px;background:#fff;box-shadow:0 2px 8px rgba(27,45,91,.06);border-left:4px solid #C9A84C;cursor:pointer}
.cat-inner{display:flex;align-items:center;gap:10px}
.cat-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-name{font-weight:700;font-size:13px;color:#1B2D5B}
.cat-cnt{font-size:10px;color:#718096;margin-top:1px}
.cat-arr{margin-left:auto;color:#CBD5E0;font-size:15px;transition:transform .2s}
.cat-card.open .cat-arr{color:#C9A84C;transform:rotate(90deg)}
.sub-wrap{margin:0 14px 4px;padding-left:12px;border-left:2px solid rgba(201,168,76,.2)}
.sub-card{background:#F8FAFC;border-radius:10px;padding:8px 11px;margin-bottom:5px;cursor:pointer;border:1.5px solid #E8EEF6}
.sub-name{font-weight:700;font-size:12px;color:#1B2D5B}
.sub-cnt{font-size:10px;color:#718096}
.sub-arr{float:right;color:#CBD5E0}
.mod-list{padding:2px 0 4px}
.mod-item{display:flex;align-items:center;gap:8px;padding:7px 9px;margin-bottom:4px;border-radius:9px;background:#fff;border:1.5px solid #E8EEF6;cursor:pointer}
.mod-dot{width:7px;height:7px;border-radius:50%;background:#C9A84C;flex-shrink:0}
.mod-name{flex:1;font-size:11.5px;color:#1B2D5B;font-weight:500}
.mod-price{font-size:10px;font-weight:700;color:#C9A84C}
.mod-ok{font-size:10px;font-weight:700;color:#1A7A4A}

/* PROMO */
.promo{margin:0 14px 14px;padding:17px;border-radius:15px;background:linear-gradient(135deg,#1B2D5B,#2A468A)}
.promo-t{color:#fff;font-family:"Playfair Display",serif;font-size:14px;font-weight:700;margin-bottom:4px}
.promo-s{color:rgba(255,255,255,.55);font-size:11px;line-height:1.5}
.promo-btn2{margin-top:11px;background:#C9A84C;color:#0D1B2A;border:none;padding:8px 15px;border-radius:8px;font-weight:700;font-size:11px;cursor:pointer;font-family:"DM Sans",sans-serif}

/* LEARN */
.path-node{display:flex;align-items:center;gap:12px;margin-bottom:15px;position:relative;padding:0 14px}
.path-node::after{content:"";position:absolute;left:34px;bottom:-15px;width:2px;height:15px;background:rgba(201,168,76,.25)}
.path-node:last-child::after{display:none}
.path-circ{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;border:3px solid transparent}
.path-circ.done{background:#1B2D5B;border-color:#C9A84C}
.path-circ.active{background:#C9A84C;border-color:#8B6B28}
.path-circ.locked{background:#E8EEF6;border-color:#CBD5E0}
.path-name{font-weight:700;font-size:13px;color:#1B2D5B}
.path-status{font-size:10px;margin-top:2px}
.lib-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #F0F2F8;cursor:pointer}
.lib-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.lib-name{flex:1;font-size:12px;font-weight:600;color:#1B2D5B}
.cal-item{display:flex;gap:11px;padding:10px 14px;border-bottom:1px solid #F0F2F8;align-items:center}
.cal-day2{font-family:"Playfair Display",serif;font-size:20px;font-weight:900;color:#1B2D5B;line-height:1;width:36px;text-align:center}
.cal-mo{font-size:9px;font-weight:700;color:#C9A84C;text-transform:uppercase;text-align:center}
.cal-name{font-weight:700;font-size:12px;color:#1B2D5B}
.cal-time2{font-size:10px;color:#718096;margin-top:2px}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 14px 12px}
.dash-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(27,45,91,.06);border-top:3px solid #C9A84C}
.dash-ico{font-size:22px;margin-bottom:4px}
.dash-val{font-family:"Playfair Display",serif;font-size:24px;font-weight:900;color:#1B2D5B}
.dash-lbl{font-size:10px;color:#A0AEC0;margin-top:2px}
.graph-box{background:#fff;margin:0 14px 12px;border-radius:13px;padding:13px;box-shadow:0 2px 8px rgba(27,45,91,.06)}
.graph-t{font-weight:700;font-size:12.5px;color:#1B2D5B;margin-bottom:11px}
.bar-wrap{display:flex;align-items:flex-end;gap:5px;height:75px}
.bar2{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#C9A84C,#8B6B28);min-width:0}
.bar-l{font-size:8px;color:#A0AEC0;text-align:center;margin-top:3px}
.badge-row2{display:flex;gap:9px;padding:11px 14px;overflow-x:auto}
.badge-row2::-webkit-scrollbar{height:0}
.badge-item{flex-shrink:0;text-align:center;width:64px}
.badge-circ{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;margin:0 auto 3px}
.badge-circ.earned{background:linear-gradient(135deg,#8B6B28,#C9A84C);box-shadow:0 3px 10px rgba(201,168,76,.3)}
.badge-circ.locked{background:#E8EEF6;filter:grayscale(1);opacity:.45}
.badge-nm{font-size:8px;font-weight:700;color:#1B2D5B;line-height:1.2}
.enr-item{background:#fff;border-radius:11px;padding:11px 12px;margin:0 14px 8px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(27,45,91,.06);cursor:pointer;border-left:4px solid #C9A84C}
.enr-title{font-weight:700;font-size:12px;color:#1B2D5B}
.enr-sub{font-size:10px;color:#A0AEC0;margin-top:1px}
.enr-pct{margin-left:auto;font-weight:800;font-size:13px;color:#C9A84C}

/* COMMUNITY */
.comm-tabs{display:flex;gap:7px;padding:0 14px 10px;overflow-x:auto}
.comm-tabs::-webkit-scrollbar{height:0}
.comm-tab{flex-shrink:0;background:#fff;border:1.5px solid #E8EEF6;border-radius:20px;padding:7px 12px;font-size:11px;font-weight:700;color:#1B2D5B;cursor:pointer;white-space:nowrap;font-family:"DM Sans",sans-serif}
.comm-tab.on{border-color:#C9A84C;background:rgba(201,168,76,.08);color:#8B6B28}
.forum-post{background:#fff;border-radius:12px;padding:12px;margin-bottom:9px;box-shadow:0 2px 8px rgba(27,45,91,.06)}
.post-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;flex-shrink:0}
.post-author{font-weight:700;font-size:12px;color:#1B2D5B}
.post-meta{font-size:9.5px;color:#A0AEC0}
.post-text{font-size:12px;color:#2D3748;line-height:1.6;margin:7px 0}
.post-reply{background:#F8FAFC;border-radius:9px;padding:8px 10px;margin-bottom:5px;border-left:3px solid #C9A84C}
.reply-author{font-weight:700;font-size:10px;color:#1B2D5B;margin-bottom:2px}
.reply-text{font-size:11px;color:#4A5568;line-height:1.5}
.forum-in{width:100%;padding:8px 10px;border:1.5px solid #E8EEF6;border-radius:9px;font-size:12px;outline:none;color:#1B2D5B;font-family:"DM Sans",sans-serif;resize:none}
.forum-in:focus{border-color:#C9A84C}
.testi-card{background:#fff;border-radius:13px;padding:15px;margin-bottom:10px;box-shadow:0 2px 10px rgba(27,45,91,.07);border-top:3px solid #C9A84C}
.testi-q{font-size:28px;color:#C9A84C;line-height:1}
.testi-txt{font-size:12px;color:#2D3748;line-height:1.6;margin:6px 0 10px;font-style:italic}
.testi-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff}
.testi-name{font-weight:700;font-size:12px;color:#1B2D5B}
.testi-role{font-size:10px;color:#718096}
.trainer-card{background:#fff;border-radius:13px;padding:13px;margin-bottom:10px;box-shadow:0 2px 8px rgba(27,45,91,.06)}
.trainer-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.trainer-name{font-family:"Playfair Display",serif;font-size:14px;font-weight:700;color:#1B2D5B}
.trainer-title{font-size:10.5px;color:#718096;margin-top:2px}
.trainer-exp{font-size:10px;color:#C9A84C;font-weight:700;margin-top:3px}
.alumni-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #F0F2F8}
.job-item{padding:12px 14px;border-bottom:1px solid #F0F2F8;cursor:pointer}
.job-title{font-weight:700;font-size:12.5px;color:#1B2D5B}
.job-co{font-size:10.5px;color:#718096;margin-top:2px}
.job-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}

/* NOTIFICATIONS */
.notif-item{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid #F0F2F8;cursor:pointer}
.notif-item.unread{background:rgba(201,168,76,.04)}
.notif-ico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-title{font-weight:700;font-size:12px;color:#1B2D5B}
.notif-txt{font-size:10.5px;color:#718096;margin-top:2px;line-height:1.4}
.notif-time{font-size:9px;color:#A0AEC0;margin-top:3px}
.notif-dot2{width:7px;height:7px;border-radius:50%;background:#C0392B;flex-shrink:0;margin-top:5px}

/* AI CHAT */
#aiPage{display:flex;flex-direction:column;height:100%}
.ai-header{padding:11px 14px 8px;border-bottom:1px solid #E8EEF6;background:#fff;flex-shrink:0}
.ai-sugs{display:flex;gap:7px;padding:7px 14px;background:#F2F5FA;overflow-x:auto;flex-shrink:0}
.ai-sugs::-webkit-scrollbar{height:0}
.ai-sug2{flex-shrink:0;background:#fff;border:1.5px solid #E8EEF6;border-radius:20px;padding:6px 11px;font-size:11px;color:#1B2D5B;font-weight:600;cursor:pointer;white-space:nowrap;font-family:"DM Sans",sans-serif}
.ai-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.ai-msgs::-webkit-scrollbar{width:0}
.ai-msg{display:flex;gap:8px;margin-bottom:12px;align-items:flex-end}
.ai-msg.user{flex-direction:row-reverse}
.ai-bubble{max-width:78%;padding:10px 12px;border-radius:16px;font-size:12.5px;line-height:1.55}
.ai-bubble.bot{background:#fff;color:#1B2D5B;border-radius:4px 16px 16px 16px;box-shadow:0 2px 8px rgba(27,45,91,.08)}
.ai-bubble.user{background:linear-gradient(135deg,#8B6B28,#C9A84C);color:#0D1B2A;border-radius:16px 4px 16px 16px}
.ai-av2{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ai-av2.bot{background:linear-gradient(135deg,#1B2D5B,#2A468A)}
.ai-av2.user{background:linear-gradient(135deg,#8B6B28,#C9A84C);font-weight:900;color:#0D1B2A;font-size:9px}
.ai-typing-dots{display:flex;gap:4px;padding:8px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#C9A84C;animation:bounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

window.onload=function(){
  setTimeout(()=>{

  },2500);
};

function switchAuthTab(mode){
  authMode2=mode;
  document.getElementById("tabLogin").classList.toggle("on",mode==="login");
  document.getElementById("tabRegister").classList.toggle("on",mode==="register");
  document.getElementById("nameField").style.display=mode==="register"?"block":"none";
  document.getElementById("authBtn").textContent=mode==="login"?"Se connecter →":"Créer mon compte →";
}

function doAuth(){
  const name=document.getElementById("inputName").value;
  if(name) userName=name.split(" ")[0];
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="flex";
  document.getElementById("userAv").textContent=userName.substring(0,2).toUpperCase();
  goTab("home");
  updateNotifBadge();
}

function toggleLang(){
  lang=lang==="fr"?"en":"fr";
  document.getElementById("langBtn").textContent=lang==="fr"?"EN":"FR";
  // Update nav labels
  const t=T[lang];
  document.getElementById("nl-home").textContent=t.home;
  document.getElementById("nl-learn").textContent=t.learn;
  document.getElementById("nl-dash").textContent=t.dash;
  document.getElementById("nl-comm").textContent=t.comm;
  document.getElementById("nl-ai").textContent=t.ai;
  document.getElementById("nl-more").textContent=t.more;
  goTab(currentTab);
}

function goTab(tab){
  currentTab=tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("on"));
  const navEl=document.getElementById("nav-"+tab);
  if(navEl) navEl.classList.add("on");
  closeSearch();
  render();
}

function updateNotifBadge(){
  const n=notifs.filter(x=>x.unread).length;
  const b=document.getElementById("notifBadge");
  if(b) b.style.display=n>0?"block":"none";
}

function toggleSearch(){
  const bar=document.getElementById("searchBar");
  bar.classList.toggle("show");
  if(bar.classList.contains("show")) document.getElementById("searchInput").focus();
  else closeSearch();
}

function closeSearch(){
  document.getElementById("searchBar").classList.remove("show");
  document.getElementById("searchResults").classList.remove("show");
  document.getElementById("searchInput").value="";
}

function doSearch(q){
  const res=document.getElementById("searchResults");
  if(!q){res.classList.remove("show");return;}
  res.classList.add("show");
  const found=Object.values(programs).filter(p=>p.title.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(found.length===0){res.innerHTML=\`<div style="text-align:center;padding:30px;color:#A0AEC0">Aucun résultat</div>\`;return;}
  res.innerHTML=found.map(p=>\`
    <div class="mod-item" style="margin-bottom:8px" onclick="openCourse('\${p.id}')">
      <div class="mod-dot" style="background:\${p.accent}"></div>
      <div class="mod-name">\${p.title}</div>
      \${p.enrolled?\`<div class="mod-ok">✓</div>\`:\`<div class="mod-price">\${p.price.toLocaleString()} F</div>\`}
    </div>
  \`).join("");
}

// ═══ RENDER ═══
function render(){
  const page=document.getElementById("page");
  if(currentTab==="home") page.innerHTML=renderHome();
  else if(currentTab==="learn") page.innerHTML=renderLearn();
  else if(currentTab==="dash") page.innerHTML=renderDash();
  else if(currentTab==="community") page.innerHTML=renderCommunity();
  else if(currentTab==="notifs") page.innerHTML=renderNotifs();
  else if(currentTab==="ai") page.innerHTML=renderAI();
  else if(currentTab==="more") page.innerHTML=renderMore();
  else if(currentTab==="course") page.innerHTML=renderCourse();
  else if(currentTab==="pay") page.innerHTML=renderPay();
  else if(currentTab==="cert") page.innerHTML=renderCert();
  else if(currentTab==="quiz") page.innerHTML=renderQuiz();
  page.scrollTop=0;
  if(currentTab==="ai") scrollAIBottom();
}

function scrollAIBottom(){setTimeout(()=>{const a=document.getElementById("aiAnchor");if(a)a.scrollIntoView({behavior:"smooth"});},100);}
function sendAIFromInput(){const inp=document.getElementById("aiInput");if(inp)sendAI(inp.value);}

async function sendAI(msg){
  if(!msg||!msg.trim()) return;
  aiMessages.push({role:"user",text:msg});
  render();
  const aiMsgsEl=document.getElementById("aiMsgs");
  if(aiMsgsEl) aiMsgsEl.insertAdjacentHTML("beforeend",\`
    <div class="ai-msg bot">
      <div class="ai-av2 bot">🤖</div>
      <div class="ai-bubble bot"><div class="ai-typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>
    </div>
  \`);
  scrollAIBottom();
  try{
    const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:400,
        messages:[
          {role:"system",content:"Tu es l\'Assistant IA de l\'ALC Institute, basé à Abidjan Songon, Côte d\'Ivoire. Tu réponds uniquement sur les formations, inscriptions, paiements (Orange Money +225 0777727482, Wave +225 0141234600). Sois chaleureux, concis. Réponds en "+lang===\"fr\"?"français":"anglais"+"."},
          ...aiMessages.slice(-6).map(m=>({role:m.role==="bot"?"assistant":"user",content:m.text})),
          {role:"user",content:msg}
        ]})
    });
    const d=await r.json();
    const reply=d.choices&&d.choices[0]?d.choices[0].message.content:"Je suis là pour vous aider ! Contactez-nous sur WhatsApp : +225 0141234600";
    aiMessages.push({role:"bot",text:reply});
  }catch(e){
    aiMessages.push({role:"bot",text:"Désolé, une erreur s\'est produite. Contactez-nous via WhatsApp : +225 0141234600"});
  }
  render();
}

function startQuiz(){quizStep=0;quizAnswers=[];quizSelected=null;quizDone=false;currentTab="quiz";render();}

function renderQuiz(){
  if(quizDone){
    const score=quizAnswers.filter((a,i)=>a===QUIZ[i].ans).length;
    const pct=Math.round(score/QUIZ.length*100);
    return \`
      <button class="btn-back" onclick="currentTab='course';render()">← Cours</button>
      <div style="padding:20px 14px;text-align:center">
        <div style="font-size:72px;margin-bottom:12px">\${score===QUIZ.length?"🏆":score>=3?"🎉":"💪"}</div>
        <div style="font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:#1B2D5B">\${score}/\${QUIZ.length}</div>
        <div style="font-size:16px;font-weight:700;color:\${score>=3?"#1A7A4A":"#C9A84C"};margin:8px 0">\${score===QUIZ.length?"Parfait !":score>=3?"Très bien !":"Continue !"}</div>
        <div style="font-size:13px;color:#718096;margin-bottom:22px">\${pct}% — \${score>=3?"Module validé !":"Relisez et réessayez."}</div>
        <button class="btn-outline" style="width:100%;border:2px solid #1B2D5B;border-radius:12px;padding:12px;background:none;font-size:13px;font-weight:700;color:#1B2D5B;margin-bottom:10px;cursor:pointer;font-family:'DM Sans',sans-serif" onclick="startQuiz()">🔄 Recommencer</button>
        \${score>=3?\`<button class="btn-gold" onclick="completeModule()">🎓 Obtenir mon certificat</button>\`:\`<button class="btn-blue" onclick="currentTab='course';render()">Retour au cours</button>\`}
      </div>
    \`;
  }
  const q=QUIZ[quizStep];
  return \`
    <button class="btn-back" onclick="currentTab='course';render()">← Cours</button>
    <div style="padding:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:9px">
        <div style="font-size:13px;font-weight:700;color:#1B2D5B">Question \${quizStep+1}/\${QUIZ.length}</div>
        <div style="font-size:11px;color:#718096">\${quizAnswers.filter((a,i)=>a===QUIZ[i].ans).length}/\${quizStep} correct</div>
      </div>
      <div style="height:4px;background:#E8EEF6;border-radius:3px;margin-bottom:16px;overflow:hidden">
        <div style="height:100%;background:#C9A84C;width:\${(quizStep/QUIZ.length)*100}%;border-radius:3px"></div>
      </div>
      <div style="font-size:14px;font-weight:700;color:#1B2D5B;margin-bottom:16px;line-height:1.4">\${q.q}</div>
      \${q.opts.map((opt,i)=>{
        let bg="#fff",border="#E8EEF6",color="#1B2D5B";
        if(quizSelected!==null){
          if(i===q.ans){bg="#E8F8EF";border="#27AE60";color="#1A7A4A";}
          else if(i===quizSelected){bg="#FDF0EE";border="#E74C3C";color="#C0392B";}
        }
        const clickFn=quizSelected===null?"answerQuiz("+i+")":"";
        return '<button onclick="'+clickFn+'" style="width:100%;padding:12px 14px;border:2px solid '+border+';border-radius:12px;background:'+bg+';text-align:left;font-size:13px;cursor:pointer;margin-bottom:8px;color:'+color+';font-weight:500;font-family:sans-serif"><b style=\'margin-right:7px\'>'+'ABCD'[i]+'.</b>'+opt+'</button>';
      }).join("")}
    </div>
  \`;
}

function answerQuiz(i){
  if(quizSelected!==null) return;
  quizSelected=i;
  render();
  setTimeout(()=>{
    quizAnswers.push(i);
    if(quizStep+1<QUIZ.length){quizStep++;quizSelected=null;}
    else quizDone=true;
    render();
  },700);
}

          <button class="share-btn" style="background:#1877F222;color:#1877F2" onclick="window.open('https://www.linkedin.com/sharing/share-offsite/?url=https://alc-institute.com','_blank')">🔗 LinkedIn</button>
          <button class="share-btn" style="background:#25D36622;color:#25D366" onclick="window.open('https://wa.me/?text=\${encodeURIComponent(shareText)}','_blank')">💬 WhatsApp</button>
          <button class="share-btn" style="background:#1B2D5B22;color:#1B2D5B" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=https://alc-institute.com','_blank')">📘 Facebook</button>
        </div>
      </div>
      <div style="margin-top:12px">
        <button class="btn-gold" onclick="currentTab='dash';render()">← Tableau de bord</button>

// ═══ MORE ═══
function renderMore(){
  const menuItems=[
    {k:"payment",icon:"💳",label:"Paiement Mobile Money",bg:"#FF660015"},
    {k:"socials",icon:"🌐",label:"Réseaux Sociaux & Contact",bg:"#1877F215"},
    {k:"faq",icon:"❓",label:"FAQ",bg:"#C9A84C15"},
    {k:"regulations",icon:"📋",label:"Règlement Intérieur",bg:"#1B2D5B15"},
    {k:"support",icon:"🎫",label:"Support & Tickets",bg:"#6B46C115"},
    {k:"diagnostic",icon:"🎯",label:"Évaluation Diagnostique",bg:"#1A7A4A15"}
  ];
  let content="";
  if(moreSection==="payment") content=renderPaySection();
  else if(moreSection==="socials") content=renderSocials();
  else if(moreSection==="faq") content=renderFAQ();
  else if(moreSection==="regulations") content=renderRegs();
  else if(moreSection==="support") content=renderSupport();
  else if(moreSection==="diagnostic") content=renderDiag();
  else content=renderContactCard();

  return \`
    <div class="sec" style="margin-bottom:10px"><div class="sec-h">☰ Plus</div></div>
    \${menuItems.map(item=>\`
      <div class="more-item" style="background:\${moreSection===item.k?item.bg:"transparent"}" onclick="moreSection=moreSection==='\${item.k}'?'':'\${item.k}';render()">
        <div class="more-ico" style="background:\${item.bg}">\${item.icon}</div>
        <div class="more-name">\${item.label}</div>
        <div style="color:#CBD5E0">›</div>
      </div>
    \`).join("")}
    \${content}
  \`;
}

function renderPaySection(){
  return \`<div style="padding:12px 14px">
    \${[
      {icon:"🟠",label:"Orange Money",num:CONTACTS.orange,bg:"#FF660015",border:"#FF6600"},
      {icon:"🔵",label:"Wave",num:CONTACTS.wave,bg:"#2196F315",border:"#2196F3"}
    ].map(m=>\`
      <div style="background:\${m.bg};border:2px solid \${m.border}22;border-radius:13px;padding:15px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
          <span style="font-size:25px">\${m.icon}</span>
          <div><div style="font-weight:700;font-size:14px;color:#1B2D5B">\${m.label}</div></div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between">
          <span style="font-family:monospace;font-size:15px;font-weight:800;color:#1B2D5B">\${m.num}</span>
          <button class="copy-btn2" onclick="copyNum('\${m.num.replace(/\s/g,'')}')" id="copybtn-\${m.num.replace(/\s/g,'')}">Copier</button>
        </div>
      </div>
    \`).join("")}
    <div class="pay-info">
      <div style="font-weight:700;font-size:12px;color:#8B6B28;margin-bottom:5px">💬 Après paiement :</div>
      <div style="font-size:11.5px;color:#8B6B28;line-height:1.6">Envoyez la capture d\'écran via WhatsApp au <b>\${CONTACTS.orange}</b></div>
      <button style="margin-top:9px;background:#25D366;border:none;border-radius:10px;padding:9px;color:#fff;font-weight:700;font-size:12px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif" onclick="window.open(CONTACTS.whatsapp,'_blank')">📲 Envoyer confirmation WhatsApp</button>
    </div>
  </div>\`;
}

function copyNum(num){
  if(navigator.clipboard) navigator.clipboard.writeText(num).then(()=>{alert("Numéro copié : "+num);});
  else{alert("Numéro : "+num);}
}

      <button class="soc-btn" style="background:#E1306C15;color:#E1306C" onclick="window.open(CONTACTS.instagram,'_blank')"><span class="soc-ico">📸</span>Instagram</button>
      <button class="soc-btn" style="background:#FF000015;color:#FF0000" onclick="window.open(CONTACTS.youtube,'_blank')"><span class="soc-ico">▶️</span>YouTube</button>
      <button class="soc-btn" style="background:#0088CC15;color:#0088CC" onclick="window.open(CONTACTS.telegram,'_blank')"><span class="soc-ico">✈️</span>Telegram</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:9px">
      <button style="background:#25D36615;border:2px solid #25D36622;border-radius:12px;padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif" onclick="window.open(CONTACTS.whatsapp,'_blank')">
        <span style="font-size:24px">💬</span><div style="text-align:left"><div style="font-weight:700;font-size:13px;color:#128C7E">WhatsApp</div><div style="font-size:11px;color:#718096">\${CONTACTS.wave}</div></div>

      <button style="background:#FF4E4E15;border:2px solid #FF4E4E22;border-radius:12px;padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif" onclick="window.open(CONTACTS.email,'_blank')">
        <span style="font-size:24px">✉️</span><div style="text-align:left"><div style="font-weight:700;font-size:13px;color:#C0392B">Email</div><div style="font-size:11px;color:#718096">ecole.alc@gmail.com</div></div>
      </button>
      <button style="background:#1B2D5B15;border:2px solid #1B2D5B22;border-radius:12px;padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif" onclick="window.open(CONTACTS.maps,'_blank')">
        <span style="font-size:24px">📍</span><div style="text-align:left"><div style="font-weight:700;font-size:13px;color:#1B2D5B">Localisation</div><div style="font-size:11px;color:#718096">Abidjan Songon, Côte d\'Ivoire</div></div>

    </div>
  </div>\`;
}

function renderFAQ(){
  return \`<div style="padding:12px 14px">
    \${FAQ.map((f,i)=>\`
      <div class="faq-item">
        <div class="faq-q" onclick="faqOpen=faqOpen===\${i}?-1:\${i};render()">
          <span>\${f.q}</span><span style="color:#C9A84C;flex-shrink:0">\${faqOpen===i?"▲":"▼"}</span>
        </div>
        \${faqOpen===i?\`<div class="faq-a">\${f.a}</div>\`:""}

function renderRegs(){
  return \`<div style="padding:12px 14px">

      <div class="reg-art">
        <div class="reg-art-t">\${r.t}</div>
        <div class="reg-art-s">\${r.s}</div>
      </div>

  </div>\`;
}

function renderSupport(){
  return \`<div style="padding:12px 14px">
    <div style="background:#fff;border-radius:12px;padding:13px;margin-bottom:12px;box-shadow:0 2px 8px rgba(27,45,91,.06)">
      <div style="font-weight:700;font-size:13px;color:#1B2D5B;margin-bottom:9px">🎫 Nouveau ticket</div>
      <input class="inp" id="ticketInput" placeholder="Décrivez votre problème…">
      <button class="btn-gold" onclick="submitTicket()">Envoyer le ticket</button>
    </div>
    <div style="font-weight:700;font-size:13px;color:#1B2D5B;margin-bottom:9px">Mes tickets</div>
    \${tickets.map(t=>\`
      <div class="ticket-item">
        <div style="font-weight:700;font-size:13px;color:#1B2D5B">\${t.title}</div>
        <div style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:\${t.color}18;color:\${t.color};display:inline-block;margin-top:4px">\${t.status}</div>
        <div style="font-size:10px;color:#A0AEC0;margin-top:4px">📅 \${t.date}</div>
      </div>
    \`).join("")}
  </div>\`;
}

function submitTicket(){
  const inp=document.getElementById("ticketInput");
  if(!inp||!inp.value.trim()) return;
  tickets.unshift({id:Date.now(),title:inp.value,status:"En attente",date:new Date().toLocaleDateString("fr-FR"),color:"#C9A84C"});
  render();
}

function renderDiag(){
  const levels=[
    {icon:"🌱",name:"Débutant",desc:"Je commence, peu ou pas d\'expérience.",color:"#1A7A4A"},

    {icon:"🏆",name:"Avancé",desc:"J\'ai une expérience significative.",color:"#6B46C1"}
  ];
  return \`<div style="padding:14px 14px">
    <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#1B2D5B;margin-bottom:6px">🎯 Évaluation Diagnostique</div>
